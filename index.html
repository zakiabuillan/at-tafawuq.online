<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية التفوق - النظام المحاسبي الذكي</title>
    
    <!-- المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a044; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; touch-action: manipulation; }
        
        .royal-blue { background-color: #1a3a5f !important; }
        .royal-gold { background-color: #c5a044 !important; }
        .text-royal-blue { color: #1a3a5f !important; }
        .text-royal-gold { color: #c5a044 !important; }
        
        aside { background-color: #1a3a5f !important; color: white !important; box-shadow: -10px 0 40px rgba(0,0,0,0.3); }
        .sidebar-item-active { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; }
        
        .login-page-bg {
            background-image: url('شعار .jpeg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            background-color: #f1f5f9;
        }
        .login-page-overlay { background: rgba(241, 245, 249, 0.96); position: absolute; inset: 0; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: #ffffff; border: 3px solid #1a3a5f; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.35); border-radius: 2.5rem; }

        .clear-input { border: 2px solid #1a3a5f !important; color: #000000 !important; font-weight: 800 !important; background: #ffffff !important; border-radius: 1rem !important; }
        .en-input { direction: ltr !important; text-align: left !important; }

        .alert-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 3000; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 25px; opacity: 1; } }

        .btn-gold { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; border-radius: 1rem; }
        .btn-update { background-color: #10b981 !important; color: white !important; font-weight: 900 !important; border-radius: 1rem; }
        .btn-whatsapp { background-color: #25d366 !important; color: white !important; font-weight: 900 !important; border-radius: 1rem; }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 1rem; border: 1px solid #e2e8f0; }
        button, input, select { min-height: 52px; outline: none; transition: all 0.2s; }
        
        .teacher-row:hover { background-color: #f8fafc; cursor: pointer; transform: scale(1.002); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 2000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.fb = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const MANAGER_PHONE = "972509329568"; 

        // --- محرك الأيقونات الثابت ---
        const Icon = ({ name, size = 32, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconElement = document.createElement('i');
                        const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        iconElement.setAttribute('data-lucide', lucideName);
                        iconElement.style.width = `${size}px`;
                        iconElement.style.height = `${size}px`;
                        iconRef.current.appendChild(iconElement);
                        window.lucide.createIcons();
                    }
                };
                render();
                const timeout = setTimeout(render, 100);
                return () => clearTimeout(timeout);
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}}></span>;
        };

        const NavItem = ({ icon, label, active, onClick, highlight = false }) => (
            <button onClick={onClick} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 ${active ? 'sidebar-item-active shadow-xl' : 'hover:bg-white/10 text-white/80 font-bold'} ${highlight && !active ? 'border-r-8 border-[#c5a044] bg-white/5' : ''}`}>
                <Icon name={icon} size={26} className={active ? 'text-[#1a3a5f]' : 'text-[#c5a044]'} />
                <span className="text-[17px] tracking-tight">{label}</span>
            </button>
        );

        const StatCard = ({ icon, label, value, color }) => (
            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 text-center animate-fade-in relative overflow-hidden group">
                <div className="absolute top-0 left-0 w-1.5 h-full" style={{ backgroundColor: color }}></div>
                <div className="p-5 rounded-2xl mb-4 inline-block shadow-inner group-hover:scale-110 transition-transform" style={{ backgroundColor: `${color}15`, color: color }}>
                    <Icon name={icon} size={35} />
                </div>
                <p className="text-[11px] text-slate-400 font-black mb-1 tracking-widest uppercase font-black">{label}</p>
                <p className="text-3xl font-black text-slate-800 uppercase tracking-tighter">{value}</p>
            </div>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [isOffline, setIsOffline] = useState(false);
            const [currentUserData, setCurrentUserData] = useState(null);
            const [loginRole, setLoginRole] = useState('admin');
            const [loginForm, setLoginForm] = useState({ user: '', pass: '', remember: false });
            const [showPassword, setShowPassword] = useState(false);
            const [view, setView] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [isActionLoading, setIsActionLoading] = useState(false);
            const [alert, setAlert] = useState({ show: false, msg: '', type: 'success' });

            const [teachers, setTeachers] = useState([]);
            const [students, setStudents] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [lessons, setLessons] = useState([]);
            
            const [editingTeacher, setEditingTeacher] = useState(null);
            const [confirmModal, setConfirmModal] = useState({ show: false, data: null });

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'at-tafawuq-pro-v2026-final-v3';

            // --- التخزين الدائم لضمان استمرارية البيانات ---
            const loadLocalData = () => {
                const get = (key) => JSON.parse(localStorage.getItem(`tafawuq_v3_${key}`) || '[]');
                setTeachers(get('teachers'));
                setStudents(get('students'));
                setAssignments(get('assignments'));
                setLessons(get('lessons'));
            };

            const saveLocalData = (key, data) => {
                localStorage.setItem(`tafawuq_v3_${key}`, JSON.stringify(data));
            };

            useEffect(() => {
                loadLocalData();
                const initAuth = async () => {
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.fb;
                    const timeoutTimer = setTimeout(() => { if (loading) { setIsOffline(true); setLoading(false); } }, 5000);
                    try {
                        if (typeof __firebase_config === 'undefined') throw new Error("Offline Mode");
                        const config = JSON.parse(__firebase_config);
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else { await signInAnonymously(auth); }
                        onAuthStateChanged(auth, u => { if(u) setUser(u); setLoading(false); clearTimeout(timeoutTimer); });
                    } catch (e) { setIsOffline(true); setLoading(false); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (isOffline || !user) return;
                const { getFirestore, collection, onSnapshot } = window.fb;
                const db = getFirestore();
                const sync = (col, setter) => {
                    const q = collection(db, 'artifacts', appId, 'public', 'data', col);
                    return onSnapshot(q, s => {
                        const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                        setter(data);
                        saveLocalData(col, data);
                    });
                };
                const unsubs = [sync('teachers', setTeachers), sync('students', setStudents), sync('assignments', setAssignments), sync('lessons', setLessons)];
                return () => unsubs.forEach(u => u());
            }, [user, isOffline]);

            const showAlert = (msg, type = 'success') => {
                setAlert({ show: true, msg, type });
                setTimeout(() => setAlert({ show: false, msg: '', type: 'success' }), 3000);
            };

            const dbOp = async (col, data, id = null) => {
                setIsActionLoading(true);
                let currentItems = col === 'teachers' ? [...teachers] : col === 'students' ? [...students] : col === 'assignments' ? [...assignments] : [...lessons];
                let updatedItems = [];
                const targetId = id || (Date.now().toString());

                if (id) {
                    if (!data) updatedItems = currentItems.filter(x => x.id !== id);
                    else updatedItems = currentItems.map(x => x.id === id ? { ...x, ...data } : x);
                } else {
                    updatedItems = [...currentItems, { ...data, id: targetId, createdAt: new Date().toISOString() }];
                }

                if (col === 'teachers') setTeachers(updatedItems);
                else if (col === 'students') setStudents(updatedItems);
                else if (col === 'assignments') setAssignments(updatedItems);
                else setLessons(updatedItems);
                
                saveLocalData(col, updatedItems);

                if (!isOffline && user) {
                    const { getFirestore, doc, setDoc, deleteDoc } = window.fb;
                    const db = getFirestore();
                    const path = ['artifacts', appId, 'public', 'data', col];
                    try {
                        if (id) {
                            const docRef = doc(db, ...path, id);
                            if (!data) await deleteDoc(docRef);
                            else await setDoc(docRef, data, { merge: true });
                        } else {
                            await setDoc(doc(db, ...path, targetId), { ...data, createdAt: new Date().toISOString() });
                        }
                    } catch (e) { console.error("Cloud sync failed", e); }
                }
                setIsActionLoading(false);
                return true;
            };

            const sendWhatsAppMessage = (lessonData) => {
                const teacherName = currentUserData?.name || "...";
                const studentName = students.find(s => s.id === lessonData.studentId)?.name || "...";
                const message = `*تحية طيبة، تم تسجيل حصة جديدة:*%0A%0A` +
                                `*المعلم:* ${teacherName}%0A` +
                                `*الطالب:* ${studentName}%0A` +
                                `*المادة:* ${lessonData.subject}%0A` +
                                `*المدة:* ${lessonData.hours} ساعة و ${lessonData.minutes} دقيقة%0A` +
                                `*التاريخ:* ${lessonData.date}%0A%0A` +
                                `_نظام أكاديمية التفوق_`;
                window.open(`https://wa.me/${MANAGER_PHONE}?text=${message}`, '_blank');
            };

            const getStudentName = (id) => students.find(s => s.id === id)?.name || '...';
            const getTeacherName = (id) => teachers.find(t => t.id === id)?.name || '...';

            // --- منطق الفلترة والترتيب الجديد ---
            const filteredAndSortedLessons = useMemo(() => {
                // فلترة: المدير يرى الكل، المعلم يرى حصصه فقط
                const filtered = lessons.filter(l => currentUserData?.role === 'admin' || l.teacherId === currentUserData?.id);
                // ترتيب: من الأحدث إلى الأقدم بناءً على التاريخ
                return [...filtered].sort((a, b) => b.date.localeCompare(a.date));
            }, [lessons, currentUserData]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-[#1a3a5f] text-white font-black">
                    <div className="w-14 h-14 border-4 border-royal-gold border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p className="text-xl animate-pulse tracking-widest uppercase">تحديث قواعد البيانات...</p>
                </div>
            );

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 login-page-bg text-right font-black">
                        <div className="login-page-overlay"></div>
                        <div className="max-w-md w-full rounded-[2.5rem] p-8 login-card animate-fade-in shadow-2xl border-t-[10px] border-royal-gold">
                            <div className="text-center mb-8">
                                <div className="inline-block p-1 bg-white rounded-full mb-4 border shadow-sm overflow-hidden"><img src="شعار .jpeg" alt="Logo" className="w-28 h-28 object-contain" /></div>
                                <h1 className="text-3xl font-black text-royal-blue tracking-tight uppercase">أكاديمية التفوق</h1>
                                <p className="text-royal-gold text-[11px] font-black uppercase tracking-widest mt-1 tracking-tighter">نظام الإدارة المحاسبي 2026</p>
                            </div>
                            <div className="flex bg-slate-100 p-2 rounded-2xl mb-8 border-2 font-black">
                                <button onClick={() => setLoginRole('admin')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${loginRole === 'admin' ? 'bg-[#1a3a5f] text-white shadow-lg' : 'text-slate-500'}`}>المدير العام</button>
                                <button onClick={() => setLoginRole('teacher')} className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${loginRole === 'teacher' ? 'bg-[#1a3a5f] text-white shadow-lg' : 'text-slate-500'}`}>المعلم</button>
                            </div>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const u = loginForm.user.trim().toLowerCase();
                                const p = loginForm.pass.trim();
                                if (loginRole === 'admin' && u === 'zakiabuillan@gmail.com' && p === 'zenazaki@2026') {
                                    setIsLoggedIn(true); setCurrentUserData({ id: 'admin', name: 'زكي أبو علان', role: 'admin' });
                                } else if (loginRole === 'teacher') {
                                    const t = teachers.find(x => x.username.toLowerCase() === u && x.password === p);
                                    if (t) { setIsLoggedIn(true); setCurrentUserData({ ...t, role: 'teacher' }); }
                                    else showAlert('بيانات الدخول غير صحيحة', 'error');
                                } else showAlert('بيانات الدخول غير صحيحة', 'error');
                            }} className="space-y-5 font-black uppercase">
                                <div><label className="block text-xs font-black text-royal-blue pr-2 mb-1 uppercase font-black uppercase">اسم المستخدم</label><input type="text" className="w-full p-4 rounded-2xl clear-input en-input font-black" placeholder="Username" value={loginForm.user} onChange={e => setLoginForm({...loginForm, user: e.target.value})} required /></div>
                                <div><label className="block text-xs font-black text-royal-blue pr-2 mb-1 font-black uppercase">كلمة المرور</label>
                                    <div className="relative">
                                        <input type={showPassword ? "text" : "password"} className="w-full p-4 rounded-2xl clear-input en-input font-black" placeholder="••••••••" value={loginForm.pass} onChange={e => setLoginForm({...loginForm, pass: e.target.value})} required />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-royal-blue"><Icon name={showPassword ? "EyeOff" : "Eye"} size={22}/></button>
                                    </div>
                                </div>
                                <button className="w-full btn-gold py-5 rounded-2xl shadow-xl uppercase font-black text-xl flex items-center justify-center gap-3">دخول النظام <Icon name="LogIn" size={24}/></button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-row-reverse overflow-hidden font-black text-right uppercase">
                    {alert.show && <div className={`alert-toast px-8 py-4 rounded-3xl text-white font-black shadow-2xl flex items-center gap-3 border-b-4 ${alert.type === 'success' ? 'bg-emerald-600 border-emerald-800' : 'bg-red-600 border-red-800'}`}><Icon name="ShieldCheck" size={28} />{alert.msg}</div>}

                    {confirmModal.show && (
                        <div className="fixed inset-0 z-[2500] modal-overlay flex items-center justify-center p-4 animate-fade-in text-center font-black">
                            <div className="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl border-t-[10px] border-emerald-500 font-black">
                                <Icon name="MessageSquare" size={60} className="text-emerald-500 mb-4 mx-auto" />
                                <h3 className="text-2xl font-black text-royal-blue mb-4 uppercase">إخطار المدير فوري</h3>
                                <p className="text-sm text-slate-500 mb-8 leading-relaxed font-black uppercase">سيتم حفظ الحصة وإرسال التفاصيل الآن إلى واتساب المدير للمراجعة.</p>
                                <div className="flex flex-col gap-3 font-black uppercase font-black">
                                    <button disabled={isActionLoading} onClick={async () => { 
                                        const res = await dbOp('lessons', confirmModal.data);
                                        if(res) { sendWhatsAppMessage(confirmModal.data); setConfirmModal({show:false, data:null}); setView('dashboard'); showAlert('تم الحفظ والإرسال'); }
                                    }} className="btn-whatsapp py-4 rounded-2xl font-black flex items-center justify-center gap-3 uppercase font-black uppercase font-black uppercase">تأكيد وإرسال <Icon name="Send" size={20} /></button>
                                    <button onClick={() => setConfirmModal({show:false, data:null})} className="text-slate-400 font-black font-black font-black uppercase">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`fixed md:relative right-0 top-0 h-screen w-72 flex flex-col p-6 shadow-2xl z-50 sidebar-transition ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'} no-print font-black uppercase font-black uppercase`}>
                        <div className="mb-10 text-center border-b border-white/10 pb-6"><Icon name="GraduationCap" size={45} className="icon-gold mb-2" /><h2 className="font-black text-lg text-white font-black uppercase">أكاديمية التفوق</h2></div>
                        <nav className="flex-1 space-y-2 overflow-y-auto custom-scrollbar font-black uppercase font-black uppercase font-black uppercase">
                            <NavItem icon="LayoutDashboard" label="الرئيسية" active={view === 'dashboard'} onClick={() => {setView('dashboard'); setSidebarOpen(false);}} />
                            {currentUserData.role === 'admin' && (
                                <>
                                    <NavItem icon="UserPlus" label="إدارة المعلمين" active={view === 'mgmt-teachers'} onClick={() => {setView('mgmt-teachers'); setSidebarOpen(false);}} highlight={true} />
                                    <NavItem icon="PlusCircle" label="إدارة الطلاب" active={view === 'mgmt-students'} onClick={() => {setView('mgmt-students'); setSidebarOpen(false);}} highlight={true} />
                                    <NavItem icon="Link" label="تنسيب الطلاب" active={view === 'assign'} onClick={() => {setView('assign'); setSidebarOpen(false);}} highlight={true} />
                                </>
                            )}
                            {currentUserData.role === 'teacher' && (
                                <NavItem icon="PlusSquare" label="تسجيل حصة جديدة" active={view === 'add-lesson'} onClick={() => {setView('add-lesson'); setSidebarOpen(false);}} highlight={true} />
                            )}
                            <NavItem icon="FileText" label="سجل الحصص" active={view === 'reports'} onClick={() => {setView('reports'); setSidebarOpen(false);}} />
                        </nav>
                        <button onClick={() => setIsLoggedIn(false)} className="mt-auto flex items-center justify-center gap-3 text-red-400 p-4 hover:bg-red-500/10 rounded-2xl transition-all font-black uppercase font-black"><Icon name="LogOut" size={24} /> خروج</button>
                    </aside>

                    <main className="flex-1 p-4 md:p-12 overflow-y-auto custom-scrollbar relative font-black text-right uppercase">
                        <header className="flex justify-between items-center mb-10 no-print font-black uppercase">
                            <div className="flex items-center gap-4 uppercase font-black font-black uppercase"><button onClick={() => setSidebarOpen(true)} className="p-2 bg-royal-blue text-white rounded-xl md:hidden shadow-lg"><Icon name="Menu" size={24}/></button><h2 className="text-xl md:text-3xl font-black text-slate-800 tracking-tighter uppercase font-black uppercase font-black">{view.toUpperCase()}</h2></div>
                        </header>

                        {view === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 font-black animate-fade-in uppercase">
                                <StatCard icon="Users" label={currentUserData.role === 'admin' ? "إجمالي الطلاب" : "طلابك المنسوبين"} value={currentUserData.role === 'admin' ? students.length : assignments.filter(a => a.teacherId === currentUserData.id).length} color="#c5a044" />
                                <StatCard icon="Clock" label="إجمالي الساعات" value={lessons.filter(l => currentUserData.role === 'admin' || l.teacherId === currentUserData.id).reduce((s,l)=>s+(parseFloat(l.hours||0)),0).toFixed(1)} color="#1a3a5f" />
                            </div>
                        )}

                        {/* إدارة المعلمين وتعديلهم */}
                        {view === 'mgmt-teachers' && currentUserData.role === 'admin' && (
                            <div className="space-y-12 animate-fade-in font-black uppercase">
                                <div className={`bg-white p-10 rounded-[2.5rem] shadow-xl border-t-[10px] ${editingTeacher ? 'border-emerald-500' : 'border-royal-blue'} font-black uppercase`}>
                                    <h3 className="text-2xl font-black text-royal-blue mb-8 flex items-center justify-center gap-4">
                                        <Icon name={editingTeacher ? "Edit" : "UserPlus"} className="icon-gold" size={40} /> 
                                        {editingTeacher ? 'تعديل بيانات معلم' : 'إضافة معلم جديد'}
                                    </h3>
                                    <form className="space-y-5 font-black uppercase" onSubmit={async (e) => {
                                        e.preventDefault(); const f = e.target.elements;
                                        const res = await dbOp('teachers', {
                                            name: f.name.value.trim(), specialty: f.specialty.value.trim(),
                                            hourlyRate: parseFloat(f.rate.value), username: f.user.value.trim().toLowerCase(), password: f.pass.value.trim()
                                        }, editingTeacher?.id);
                                        if(res) { showAlert('تم حفظ بيانات المعلم بنجاح'); e.target.reset(); setEditingTeacher(null); }
                                    }}>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <input name="name" defaultValue={editingTeacher?.name || ''} placeholder="الاسم الرباعي" className="w-full p-4 clear-input font-black uppercase font-black" required />
                                            <input name="specialty" defaultValue={editingTeacher?.specialty || ''} placeholder="التخصص" className="w-full p-4 clear-input font-black uppercase font-black" required />
                                        </div>
                                        <input name="rate" type="number" defaultValue={editingTeacher?.hourlyRate || ''} placeholder="سعر الساعة (₪)" className="w-full p-4 clear-input font-black uppercase font-black" required />
                                        <div className="grid grid-cols-2 gap-6">
                                            <input name="user" defaultValue={editingTeacher?.username || ''} placeholder="Username" className="w-full p-4 clear-input en-input font-black font-black uppercase" required />
                                            <input name="pass" defaultValue={editingTeacher?.password || ''} placeholder="Password" className="w-full p-4 clear-input en-input font-black font-black uppercase" required />
                                        </div>
                                        <div className="flex gap-4 pt-4 font-black font-black uppercase font-black uppercase">
                                            <button disabled={isActionLoading} className={`flex-1 py-5 rounded-2xl font-black text-xl shadow-lg ${editingTeacher ? 'btn-update' : 'btn-dark-blue text-white'}`}>{editingTeacher ? 'تحديث البيانات' : 'تفعيل الحساب'}</button>
                                            {editingTeacher && <button type="button" onClick={() => setEditingTeacher(null)} className="px-8 bg-slate-100 rounded-2xl font-black font-black uppercase">إلغاء</button>}
                                        </div>
                                    </form>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b flex justify-between items-center font-black uppercase font-black"><span>سجل المعلمين وبيانات الدخول</span><Icon name="ShieldCheck" className="text-royal-gold font-black uppercase font-black uppercase" size={35} /></div>
                                    <div className="table-container font-black font-black uppercase font-black"><table className="w-full text-right text-sm">
                                        <thead className="bg-slate-50 font-black border-b uppercase font-black font-black uppercase"><tr><th className="p-4">المعلم</th><th className="p-4">User / Pass</th><th className="p-4 text-center">إجراء</th></tr></thead>
                                        <tbody className="font-bold uppercase font-black uppercase font-black font-black uppercase">
                                            {teachers.map(t => (
                                                <tr key={t.id} onClick={() => {setEditingTeacher(t); window.scrollTo({top:0, behavior:'smooth'})}} className="border-b teacher-row">
                                                    <td className="p-4 text-royal-blue font-black uppercase font-black uppercase">{t.name} ({t.specialty})</td>
                                                    <td className="p-4 text-slate-500 en-input">{t.username} / {t.password}</td>
                                                    <td className="p-4 text-center font-black uppercase font-black font-black uppercase font-black font-black uppercase"><button onClick={(e) => {e.stopPropagation(); if(confirm('حذف؟')) dbOp('teachers', null, t.id)}} className="text-red-400 font-black uppercase font-black uppercase font-black"><Icon name="Trash2" size={24}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table></div>
                                </div>
                            </div>
                        )}

                        {/* إدارة الطلاب */}
                        {view === 'mgmt-students' && currentUserData.role === 'admin' && (
                            <div className="space-y-12 animate-fade-in font-black uppercase">
                                <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border-t-[10px] border-royal-gold font-black uppercase font-black uppercase">
                                    <h3 className="text-2xl font-black text-royal-blue mb-8 flex items-center justify-center gap-3 uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black"><Icon name="PlusCircle" className="icon-blue uppercase font-black font-black uppercase font-black uppercase" size={40} /> تسجيل طالب جديد</h3>
                                    <form className="space-y-4 font-black uppercase font-black uppercase font-black uppercase font-black uppercase" onSubmit={async (e) => { 
                                        e.preventDefault(); const f=e.target; 
                                        const res = await dbOp('students', {name:f.name.value.trim(), regNo:'TAF-'+Math.floor(1000+Math.random()*9000)}); 
                                        if(res) { f.reset(); showAlert('تم تسجيل الطالب'); }
                                    }}>
                                        <input name="name" placeholder="اسم الطالب الرباعي" className="w-full p-4 border rounded-2xl clear-input font-black uppercase font-black font-black font-black font-black font-black font-black font-black uppercase" required />
                                        <button disabled={isActionLoading} className="w-full btn-gold py-5 rounded-2xl shadow-lg uppercase text-xl font-black uppercase font-black font-black uppercase font-black uppercase">حفظ الطالب</button>
                                    </form>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b flex justify-between items-center font-black uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black"><span>الطلاب المسجلون</span><Icon name="UserCheck" className="text-royal-gold font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black" size={35} /></div>
                                    <div className="table-container font-black font-black font-black uppercase font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase"><table className="w-full text-right text-sm">
                                        <thead><tr className="bg-slate-50 font-black border-b uppercase font-black font-black font-black uppercase"><th>اسم الطالب</th><th className="text-center font-black uppercase font-black uppercase">إجراء</th></tr></thead>
                                        <tbody className="font-bold uppercase font-black font-black font-black uppercase">
                                            {students.map(s => (
                                                <tr key={s.id} className="border-b last:border-0 hover:bg-slate-50 uppercase font-black font-black font-black font-black uppercase font-black font-black uppercase font-black font-black uppercase"><td className="p-4 text-royal-blue font-black uppercase font-black font-black uppercase font-black font-black font-black font-black">{s.name}</td><td className="p-4 text-center font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase"><button onClick={() => dbOp('students', null, s.id)} className="text-red-400 font-black uppercase font-black font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black uppercase font-black"><Icon name="Trash2" size={24}/></button></td></tr>
                                            ))}
                                        </tbody>
                                    </table></div>
                                </div>
                            </div>
                        )}

                        {/* التنسيب والربط */}
                        {view === 'assign' && currentUserData.role === 'admin' && (
                            <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-[12px] border-royal-blue relative overflow-hidden font-black uppercase font-black uppercase font-black uppercase font-black uppercase">
                                <div className="absolute top-0 left-0 w-2 h-full royal-gold opacity-50 shadow-inner font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black"></div>
                                <h3 className="text-2xl font-black text-royal-blue text-center mb-8 uppercase flex items-center justify-center gap-3 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black"><Icon name="Link" className="icon-gold font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase" size={40}/> تأكيد التنسيب والربط</h3>
                                <form className="space-y-6 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase" onSubmit={async (e) => {
                                    e.preventDefault(); const tId = e.target.elements.teacherId.value; const sId = e.target.elements.studentId.value;
                                    if(!tId || !sId) return;
                                    const res = await dbOp('assignments', { teacherId: tId, studentId: sId, createdAt: new Date().toISOString() });
                                    if(res) showAlert('تمت عملية الربط بنجاح');
                                }}>
                                    <div className="space-y-2 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase"><label className="text-sm font-black pr-2 block uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black">المعلم المسؤول</label><select name="teacherId" className="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl font-black shadow-inner en-input uppercase font-black font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase" required><option value="">-- اختر من القائمة --</option>{teachers.map(t=><option key={t.id} value={t.id}>{t.name} ({t.specialty})</option>)}</select></div>
                                    <div className="space-y-2 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase"><label className="text-sm font-black pr-2 block uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black">الطالب المنسوب</label><select name="studentId" className="w-full p-5 bg-white border-2 border-slate-200 rounded-2xl font-black shadow-inner en-input font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black" required><option value="">-- اختر من القائمة --</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                                    <button disabled={isActionLoading} type="submit" className="w-full btn-gold py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-xl flex items-center justify-center gap-3 border-b-4 border-amber-700 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black">تأكيد الربط</button>
                                </form>
                            </div>
                        )}

                        {/* تسجيل حصة (المعلم) */}
                        {view === 'add-lesson' && currentUserData.role === 'teacher' && (
                            <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-[10px] border-royal-gold animate-fade-in no-print text-right font-black uppercase font-black uppercase font-black font-black uppercase font-black uppercase font-black">
                                <h3 className="text-2xl font-black text-royal-blue text-center mb-8 uppercase font-black font-black uppercase font-black uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black font-black uppercase font-black font-black font-black uppercase font-black uppercase font-black font-black uppercase font-black font-black font-black uppercase font-black"><Icon name="PlusSquare" className="icon-gold ml-2 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black" size={30}/> تسجيل حصة تعليمية</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault(); const fd = new FormData(e.target);
                                    const data = { studentId: fd.get('studentId'), subject: fd.get('subject'), hours: fd.get('hours'), minutes: fd.get('minutes'), date: fd.get('date'), teacherId: currentUserData.id };
                                    const res = await dbOp('lessons', data);
                                    if(res) { sendWhatsAppMessage(data); setView('dashboard'); showAlert('تم تسجيل الحصة بنجاح وإرسال الإخطار'); }
                                }} className="space-y-6 font-black uppercase font-black font-black font-black font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black">
                                    <div><label className="text-[11px] text-slate-400 block mb-1 font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black font-black uppercase">اختر الطالب (من طلابك المنسوبين فقط)</label><select name="studentId" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black shadow-inner en-input font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black uppercase font-black" required><option value="">-- اختر الطالب --</option>{assignments.filter(a => a.teacherId === currentUserData.id).map(a => <option key={a.studentId} value={a.studentId}>{getStudentName(a.studentId)}</option>)}</select></div>
                                    <div><label className="text-[11px] text-slate-400 block mb-1 font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black font-black uppercase">المادة التعليمية</label><input name="subject" type="text" className="w-full p-4 bg-white border-2 rounded-2xl font-black text-sm text-right font-black uppercase uppercase font-black font-black font-black font-black font-black font-black font-black font-black uppercase font-black" placeholder="..." required /></div>
                                    <div className="grid grid-cols-2 gap-4 font-black font-black uppercase font-black font-black font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black font-black font-black uppercase font-black font-black font-black font-black uppercase font-black font-black font-black font-black font-black font-black font-black uppercase font-black font-black font-black font-black font-black font-black font-black"><div><label className="text-[11px] text-slate-400 block mb-1 uppercase font-black font-black uppercase font-black uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black uppercase font-black">ساعات</label><input name="hours" type="number" min="0" className="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl text-center text-2xl font-black font-black font-black font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black" defaultValue="0" required /></div><div><label className="text-[11px] text-slate-400 block mb-1 uppercase font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black font-black font-black">دقائق</label><input name="minutes" type="number" min="0" max="59" className="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl text-center text-2xl font-black font-black font-black font-black font-black font-black uppercase font-black font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black font-black uppercase font-black" defaultValue="0" required /></div></div>
                                    <div><label className="text-[11px] text-slate-400 block mb-1 text-right font-black uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black font-black uppercase font-black">تاريخ الحصة</label><input name="date" type="date" className="w-full p-4 bg-white border-2 border-slate-200 rounded-2xl font-black text-center font-black font-black font-black font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black" defaultValue={new Date().toISOString().split('T')[0]} required /></div>
                                    <button disabled={isActionLoading} type="submit" className="w-full bg-royal-blue text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-slate-800 flex items-center justify-center gap-3 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black font-black font-black font-black uppercase font-black font-black font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black uppercase font-black"><Icon name="Whatsapp" size={28} className="icon-gold uppercase font-black font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black font-black font-black font-black font-black font-black uppercase font-black"/></button>
                                </form>
                            </div>
                        )}

                        {/* سجل الحصص الفردي (المصلحة والفلترة والترتيب) */}
                        {view === 'reports' && (
                             <div className="bg-white rounded-3xl shadow-xl overflow-hidden border animate-fade-in font-black uppercase text-black text-right uppercase">
                                <div className="p-6 bg-royal-blue text-white flex justify-between items-center font-black uppercase font-black">
                                    <h3 className="text-xl font-black uppercase">سجل الحصص {currentUserData.role === 'admin' ? 'العام' : 'الخاص بك'}</h3>
                                    <button onClick={() => window.print()} className="btn-gold px-6 py-2 rounded-xl text-xs flex items-center gap-2 font-black uppercase"><Icon name="Printer" size={24}/></button>
                                </div>
                                <div className="table-container custom-scrollbar font-black text-black font-black uppercase">
                                    <table className="w-full text-right text-sm font-black uppercase font-black">
                                        <thead className="bg-slate-50 border-b text-slate-400 text-[10px] tracking-widest font-black uppercase font-black uppercase"><tr><th>التاريخ</th><th>{currentUserData.role === 'admin' ? 'المعلم' : 'الطالب'}</th><th>{currentUserData.role === 'admin' ? 'الطالب' : 'المادة'}</th><th className="text-center font-black">المدة</th></tr></thead>
                                        <tbody className="font-bold uppercase font-black uppercase font-black uppercase">
                                            {filteredAndSortedLessons.map(l=>(
                                                <tr key={l.id} className="border-b last:border-0 hover:bg-slate-50 uppercase font-black font-black"><td className="p-4 text-slate-500 font-black">{l.date}</td><td className="p-4 font-black">{currentUserData.role === 'admin' ? getTeacherName(l.teacherId) : getStudentName(l.studentId)}</td><td className="p-4 font-black">{currentUserData.role === 'admin' ? getStudentName(l.studentId) : l.subject}</td><td className="p-4 text-center text-royal-blue font-black tracking-tighter font-black">{l.hours}س {l.minutes}د</td></tr>
                                            ))}
                                            {filteredAndSortedLessons.length === 0 && <tr><td colSpan="4" className="p-12 text-center text-slate-300 italic font-black uppercase">لا توجد حصص مسجلة حالياً</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                             </div>
                        )}
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
