<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية التفوق - النظام المحاسبي الشامل</title>
    
    <!-- المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a044; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; }
        .royal-blue { background-color: var(--primary); }
        .text-royal-gold { color: var(--gold); }
        .clear-input { border: 2px solid var(--primary) !important; border-radius: 1rem !important; padding: 1rem; outline: none; }
        .clear-input:focus { border-color: var(--gold) !important; box-shadow: 0 0 0 3px rgba(197, 160, 68, 0.2); }
        .btn-main { background-color: var(--primary); color: white; font-weight: 900; transition: all 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 1. مكون الأيقونات البسيط
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name.toLowerCase()} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            // حالة تسجيل الدخول والواجهة الحالية
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState(null);
            
            // 2. إدارة قواعد البيانات (State) مع الحفظ التلقائي
            const [teachers, setTeachers] = useState(() => JSON.parse(localStorage.getItem('teachers')) || []);
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('students')) || []);
            const [assignments, setAssignments] = useState(() => JSON.parse(localStorage.getItem('assignments')) || []);
            const [lessons, setLessons] = useState(() => JSON.parse(localStorage.getItem('lessons')) || []);

            useEffect(() => { localStorage.setItem('teachers', JSON.stringify(teachers)); }, [teachers]);
            useEffect(() => { localStorage.setItem('students', JSON.stringify(students)); }, [students]);
            useEffect(() => { localStorage.setItem('assignments', JSON.stringify(assignments)); }, [assignments]);
            useEffect(() => { localStorage.setItem('lessons', JSON.stringify(lessons)); }, [lessons]);

            // دوال مساعدة لجلب الأسماء
            const getTeacherName = (id) => teachers.find(t => t.id === id)?.name || 'غير معروف';
            const getStudentName = (id) => students.find(s => s.id === id)?.name || 'غير معروف';

            // 3. دالة تسجيل الدخول
            const handleLogin = (e) => {
                e.preventDefault();
                const user = e.target.username.value;
                const pass = e.target.password.value;

                if (user === "admin" && pass === "123") {
                    setCurrentUser({ id: 'admin', name: "المدير العام", role: "admin" });
                    setIsLoggedIn(true);
                } else {
                    const teacher = teachers.find(t => t.username === user && t.password === pass);
                    if (teacher) {
                        setCurrentUser({ ...teacher, role: "teacher" });
                        setIsLoggedIn(true);
                    } else {
                        alert("بيانات الدخول خاطئة");
                    }
                }
            };

            // واجهة تسجيل الدخول
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md border-t-8 border-royal-blue text-center">
                            <h2 className="text-2xl font-black mb-6 text-royal-blue">دخول الأكاديمية</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input name="username" placeholder="اسم المستخدم (admin)" className="w-full clear-input text-left" dir="ltr" required />
                                <input name="password" type="password" placeholder="كلمة المرور (123)" className="w-full clear-input text-left" dir="ltr" required />
                                <button className="w-full btn-main py-4 rounded-2xl text-xl">دخول</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // حسابات لوحة التحكم (الساعات والإجماليات)
            const totalAdminHours = lessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0);
            const myLessons = lessons.filter(l => l.teacherId === currentUser.id);
            const myAssignedStudents = assignments.filter(a => a.teacherId === currentUser.id);

            return (
                <div className="min-h-screen flex flex-col md:flex-row-reverse">
                    
                    {/* 4. القائمة الجانبية */}
                    <aside className="w-full md:w-64 bg-[#1a3a5f] text-white p-6 flex flex-col gap-4 shadow-2xl z-10">
                        <div className="text-center mb-6 border-b border-white/10 pb-4">
                            <h1 className="font-black text-xl">أكاديمية التفوق</h1>
                        </div>
                        
                        <button onClick={() => setView('dashboard')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'dashboard' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                            <Icon name="layout-dashboard" /> الرئيسية
                        </button>
                        
                        {currentUser.role === 'admin' && (
                            <>
                                <button onClick={() => setView('assign')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'assign' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                                    <Icon name="link" /> تنسيب الطلاب
                                </button>
                                <button onClick={() => setView('reports')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'reports' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                                    <Icon name="file-text" /> سجل الحصص العام
                                </button>
                                <button onClick={() => setView('finance')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'finance' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                                    <Icon name="pie-chart" /> التقارير المالية
                                </button>
                            </>
                        )}

                        {currentUser.role === 'teacher' && (
                            <>
                                <button onClick={() => setView('add-lesson')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'add-lesson' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                                    <Icon name="plus-circle" /> تسجيل حصة جديدة
                                </button>
                                <button onClick={() => setView('reports')} className={`p-4 rounded-xl text-right flex items-center gap-3 font-bold transition-colors ${view === 'reports' ? 'bg-[#c5a044] text-[#1a3a5f]' : 'hover:bg-white/10'}`}>
                                    <Icon name="file-text" /> حصصي المسجلة
                                </button>
                            </>
                        )}

                        <button onClick={() => setIsLoggedIn(false)} className="mt-auto p-4 text-red-400 font-bold flex items-center gap-3 hover:bg-red-500/10 rounded-xl transition-colors">
                            <Icon name="log-out" /> تسجيل الخروج
                        </button>
                    </aside>

                    {/* 5. مساحة العمل والمحتوى */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-slate-50">
                        
                        {/* ================= الواجهة الرئيسية ================= */}
                        {view === 'dashboard' && (
                            <div className="animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-r-8 border-[#c5a044]">
                                    <h3 className="text-slate-400 text-sm font-bold mb-2">مرحباً بك</h3>
                                    <p className="text-2xl font-black">{currentUser.name}</p>
                                </div>
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-r-8 border-blue-900">
                                    <h3 className="text-slate-400 text-sm font-bold mb-2">
                                        {currentUser.role === 'admin' ? 'إجمالي الساعات المسجلة بالمنصة' : 'إجمالي الساعات التي درستها'}
                                    </h3>
                                    <p className="text-4xl font-black">
                                        {currentUser.role === 'admin' 
                                            ? totalAdminHours.toFixed(1) 
                                            : myLessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0).toFixed(1)} <span className="text-lg">ساعة</span>
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ================= واجهة تنسيب الطلاب (مع الإصلاح) ================= */}
                        {view === 'assign' && currentUser.role === 'admin' && (
                            <div className="animate-fade-in space-y-8">
                                {/* نموذج الإضافة */}
                                <div className="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-[#1a3a5f]">
                                    <h3 className="text-2xl font-black mb-6 text-[#1a3a5f] flex items-center gap-2">
                                        <Icon name="link" className="text-[#c5a044]" /> تنسيب وربط طالب بمعلم
                                    </h3>
                                    <form className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const newAssignment = {
                                            id: Date.now().toString(),
                                            teacherId: e.target.teacherId.value,
                                            studentId: e.target.studentId.value
                                        };
                                        setAssignments([...assignments, newAssignment]);
                                        alert("تم ربط الطالب بالمعلم بنجاح!");
                                    }}>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block font-bold mb-2 text-sm text-slate-600">المعلم</label>
                                                <select name="teacherId" className="w-full clear-input" required>
                                                    <option value="">-- اختر المعلم --</option>
                                                    {teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                    {/* بيانات تجريبية في حال لم تضف معلمين بعد */}
                                                    <option value="t1">أ. أحمد (معلم تجريبي)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block font-bold mb-2 text-sm text-slate-600">الطالب</label>
                                                <select name="studentId" className="w-full clear-input" required>
                                                    <option value="">-- اختر الطالب --</option>
                                                    {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                    {/* بيانات تجريبية */}
                                                    <option value="s1">طالب تجريبي 1</option>
                                                    <option value="s2">طالب تجريبي 2</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button className="w-full btn-main py-4 rounded-xl mt-4 text-lg">إتمام عملية التنسيب</button>
                                    </form>
                                </div>

                                {/* قائمة التنسيبات الحالية (الحل للمشكلة الأولى) */}
                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden border">
                                    <div className="bg-slate-50 p-6 border-b flex items-center gap-2">
                                        <Icon name="users" className="text-[#1a3a5f]" />
                                        <h3 className="text-xl font-black">قائمة التنسيبات الحالية</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right">
                                            <thead className="bg-slate-100 border-b">
                                                <tr>
                                                    <th className="p-4 font-bold text-slate-600">المعلم المكلّف</th>
                                                    <th className="p-4 font-bold text-slate-600">الطالب المنسوب</th>
                                                    <th className="p-4 font-bold text-slate-600 text-center">إجراء</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {assignments.map(a => (
                                                    <tr key={a.id} className="border-b last:border-0 hover:bg-slate-50">
                                                        <td className="p-4 font-bold text-[#1a3a5f]">{getTeacherName(a.teacherId) || a.teacherId}</td>
                                                        <td className="p-4">{getStudentName(a.studentId) || a.studentId}</td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={() => setAssignments(assignments.filter(x => x.id !== a.id))} className="text-red-500 hover:text-red-700">
                                                                <Icon name="trash-2" size={20} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {assignments.length === 0 && (
                                                    <tr><td colSpan="3" className="p-8 text-center text-slate-400">لا يوجد طلاب منسوبين حالياً</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= واجهة تسجيل حصة (للمعلم) ================= */}
                        {view === 'add-lesson' && currentUser.role === 'teacher' && (
                            <div className="max-w-xl mx-auto bg-white p-8 rounded-[2rem] shadow-xl animate-fade-in border-t-[10px] border-[#c5a044]">
                                <h3 className="text-2xl font-black mb-8 text-[#1a3a5f] text-center flex items-center justify-center gap-2">
                                    <Icon name="plus-square" className="text-[#c5a044]" /> تسجيل حصة تعليمية
                                </h3>
                                <form className="space-y-5" onSubmit={(e) => {
                                    e.preventDefault();
                                    const newLesson = {
                                        id: Date.now().toString(),
                                        teacherId: currentUser.id,
                                        studentId: e.target.studentId.value,
                                        subject: e.target.subject.value,
                                        hours: Number(e.target.hours.value),
                                        mins: Number(e.target.mins.value),
                                        date: e.target.date.value
                                    };
                                    setLessons([newLesson, ...lessons]);
                                    e.target.reset();
                                    alert("تم حفظ الحصة بنجاح في السجل!");
                                    setView('reports');
                                }}>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">اختر الطالب (من طلابك فقط)</label>
                                        <select name="studentId" className="w-full clear-input" required>
                                            <option value="">-- اختر من القائمة --</option>
                                            {/* عرض الطلاب المربوطين بهذا المعلم فقط */}
                                            {myAssignedStudents.map(a => <option key={a.id} value={a.studentId}>{getStudentName(a.studentId) || a.studentId}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">المادة الدراسية</label>
                                        <input name="subject" placeholder="مثال: رياضيات، كيمياء" className="w-full clear-input" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-500 mb-2 text-center">ساعات</label>
                                            <input name="hours" type="number" min="0" className="w-full clear-input text-center text-xl font-bold" defaultValue="0" required />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-500 mb-2 text-center">دقائق</label>
                                            <input name="mins" type="number" min="0" max="59" className="w-full clear-input text-center text-xl font-bold" defaultValue="0" required />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">تاريخ الحصة</label>
                                        <input name="date" type="date" className="w-full clear-input" defaultValue={new Date().toISOString().split('T')[0]} required />
                                    </div>
                                    <button className="w-full btn-main py-5 rounded-2xl flex justify-center items-center gap-3 text-xl mt-4">
                                        <Icon name="check-circle" /> إرسال واعتماد الحصة
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* ================= واجهة سجل الحصص (الحل للمشكلة الثانية) ================= */}
                        {view === 'reports' && (
                            <div className="animate-fade-in bg-white rounded-3xl shadow-xl overflow-hidden border">
                                <div className="bg-[#1a3a5f] text-white p-6 border-b flex justify-between items-center">
                                    <h3 className="text-xl font-black flex items-center gap-2">
                                        <Icon name="file-text" className="text-[#c5a044]"/>
                                        {currentUser.role === 'admin' ? 'السجل العام لجميع حصص المنصة' : 'سجل حصصك الخاص'}
                                    </h3>
                                    <div className="bg-white/20 px-4 py-2 rounded-xl text-sm font-bold">
                                        إجمالي الحصص: {currentUser.role === 'admin' ? lessons.length : myLessons.length}
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-right text-sm">
                                        <thead className="bg-slate-100 border-b">
                                            <tr>
                                                <th className="p-4 font-bold text-slate-600">التاريخ</th>
                                                {currentUser.role === 'admin' && <th className="p-4 font-bold text-slate-600">المعلم</th>}
                                                <th className="p-4 font-bold text-slate-600">الطالب</th>
                                                <th className="p-4 font-bold text-slate-600">المادة</th>
                                                <th className="p-4 font-bold text-slate-600 text-center">المدة (س:د)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {/* عرض كل الحصص للمدير، وحصص المعلم لنفسه فقط */}
                                            {(currentUser.role === 'admin' ? lessons : myLessons).map(l => (
                                                <tr key={l.id} className="border-b last:border-0 hover:bg-slate-50">
                                                    <td className="p-4 text-slate-500 font-bold" dir="ltr">{l.date}</td>
                                                    {currentUser.role === 'admin' && <td className="p-4 font-bold text-[#1a3a5f]">{getTeacherName(l.teacherId) || l.teacherId}</td>}
                                                    <td className="p-4">{getStudentName(l.studentId) || l.studentId}</td>
                                                    <td className="p-4">{l.subject}</td>
                                                    <td className="p-4 text-center font-bold text-blue-700">{l.hours}س و {l.mins}د</td>
                                                </tr>
                                            ))}
                                            {((currentUser.role === 'admin' ? lessons : myLessons).length === 0) && (
                                                <tr><td colSpan={currentUser.role === 'admin' ? 5 : 4} className="p-8 text-center text-slate-400">لا توجد حصص مسجلة حتى الآن</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* ================= التقارير المالية (تم الإبقاء عليها كما هي) ================= */}
                        {view === 'finance' && currentUser.role === 'admin' && (
                            <div className="animate-fade-in bg-white p-8 rounded-3xl shadow-xl text-center">
                                <Icon name="pie-chart" size={60} className="mx-auto text-[#c5a044] mb-4" />
                                <h2 className="text-2xl font-black mb-2 text-[#1a3a5f]">التقارير المالية</h2>
                                <p className="text-slate-500">تم تجهيز هذه الواجهة مسبقاً، يمكنك ربطها ببيانات الساعات المعروضة في سجل الحصص العام.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
