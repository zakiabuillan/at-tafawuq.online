<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية التفوق - النظام الشامل والذكي</title>
    
    <!-- المكتبات البرمجية الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a044; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; touch-action: manipulation; }
        
        .royal-blue { background-color: var(--primary) !important; }
        .royal-gold { background-color: var(--gold) !important; }
        .text-royal-blue { color: var(--primary) !important; }
        .text-royal-gold { color: var(--gold) !important; }
        
        aside { background-color: var(--primary) !important; color: white !important; box-shadow: -10px 0 40px rgba(0,0,0,0.3); }
        .sidebar-item-active { background-color: var(--gold) !important; color: var(--primary) !important; font-weight: 900 !important; }
        
        .login-page-bg { background-color: #f1f5f9; }
        .login-page-overlay { background: rgba(241, 245, 249, 0.96); position: absolute; inset: 0; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: #ffffff; border: 3px solid var(--primary); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.35); border-radius: 2.5rem; }

        .clear-input { border: 2px solid var(--primary) !important; color: #000000 !important; font-weight: 800 !important; background: #ffffff !important; border-radius: 1rem !important; outline: none; transition: all 0.3s;}
        .clear-input:focus { box-shadow: 0 0 0 3px rgba(197, 160, 68, 0.5) !important; }
        .en-input { direction: ltr !important; text-align: left !important; }

        .alert-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 3000; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 25px; opacity: 1; } }

        .btn-gold { background-color: var(--gold) !important; color: var(--primary) !important; font-weight: 900 !important; border-radius: 1rem; transition: all 0.3s; }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === مفاتيح FIREBASE ===
        const firebaseConfig = {
            // apiKey: "YOUR_KEY",
            // projectId: "YOUR_PROJECT"
        };

        try {
            if(firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                window.fb = { db, doc, setDoc, collection, onSnapshot, deleteDoc };
            }
        } catch (error) { console.error("Firebase Init Error"); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 32, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconElement = document.createElement('i');
                        const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        iconElement.setAttribute('data-lucide', lucideName);
                        iconElement.style.width = `${size}px`;
                        iconElement.style.height = `${size}px`;
                        iconRef.current.appendChild(iconElement);
                        window.lucide.createIcons();
                    }
                };
                render();
                const timeout = setTimeout(render, 100);
                return () => clearTimeout(timeout);
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}}></span>;
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 ${active ? 'sidebar-item-active shadow-xl' : 'hover:bg-white/10 text-white/80 font-bold'}`}>
                <Icon name={icon} size={26} className={active ? 'text-[#1a3a5f]' : 'text-[#c5a044]'} />
                <span className="text-[17px] tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('tafawuq_session_v4'));
            const [currentUserData, setCurrentUserData] = useState(() => {
                const saved = localStorage.getItem('tafawuq_session_v4');
                return saved ? JSON.parse(saved) : null;
            });

            const [view, setView] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [alert, setAlert] = useState({ show: false, msg: '', type: 'success' });
            
            const [teachers, setTeachers] = useState(() => JSON.parse(localStorage.getItem('db_teachers_v4')) || []);
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('db_students_v4')) || []);
            const [assignments, setAssignments] = useState(() => JSON.parse(localStorage.getItem('db_assignments_v4')) || []);
            const [lessons, setLessons] = useState(() => JSON.parse(localStorage.getItem('db_lessons_v4')) || []);
            
            useEffect(() => { localStorage.setItem('db_teachers_v4', JSON.stringify(teachers)); }, [teachers]);
            useEffect(() => { localStorage.setItem('db_students_v4', JSON.stringify(students)); }, [students]);
            useEffect(() => { localStorage.setItem('db_assignments_v4', JSON.stringify(assignments)); }, [assignments]);
            useEffect(() => { localStorage.setItem('db_lessons_v4', JSON.stringify(lessons)); }, [lessons]);

            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [showPassword, setShowPassword] = useState(false);
            const [rememberMe, setRememberMe] = useState(true); 

            // حالات المساعد الذكي
            const [aiInput, setAiInput] = useState('');
            const [aiResponse, setAiResponse] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);

            // =========================================================================
            // دالة الاتصال بنموذج Gemini (مترجمة من بايثون إلى جافا سكريبت)
            // =========================================================================
            const askGemini = async (e) => {
                e.preventDefault();
                if(!aiInput.trim()) return;
                
                setIsAiLoading(true);
                setAiResponse('');
                
                // === ضع مفتاح API الخاص بـ Gemini هنا ===
                const GEMINI_API_KEY = "ضع_مفتاح_GEMINI_هنا"; 
                // ==========================================

                if (GEMINI_API_KEY === "ضع_مفتاح_GEMINI_هنا") {
                    setAiResponse("تنبيه: يرجى وضع مفتاح GEMINI_API_KEY الخاص بك في الكود أولاً لكي يعمل المساعد الذكي.");
                    setIsAiLoading(false);
                    return;
                }

                // تجهيز الرابط والبيانات كما طلبت (gemini-3-flash-preview)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}`;
                
                // بناء الطلب (Payload) ليطابق الكود الذي أرسلته (يحتوي على أداة بحث جوجل)
                const payload = {
                    contents: [{ role: "user", parts: [{ text: aiInput }] }],
                    tools: [{ googleSearch: {} }]
                };

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await response.json();
                    
                    if (data.candidates && data.candidates.length > 0) {
                        setAiResponse(data.candidates[0].content.parts[0].text);
                    } else {
                        setAiResponse("عذراً، لم أتمكن من استخراج إجابة.");
                    }
                } catch (error) {
                    console.error(error);
                    setAiResponse("حدث خطأ أثناء الاتصال بالخادم. تأكد من صحة المفتاح واتصال الإنترنت.");
                }
                
                setIsAiLoading(false);
                setAiInput('');
            };

            const showAlert = (msg, type = 'success') => {
                setAlert({ show: true, msg, type });
                setTimeout(() => setAlert({ show: false, msg: '', type: 'success' }), 3000);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserData(null);
                localStorage.removeItem('tafawuq_session_v4'); 
            };

            const getStudentName = (id) => students.find(s => s.id === id)?.name || 'طالب غير متوفر';
            const getTeacherName = (id) => teachers.find(t => t.id === id)?.name || 'معلم غير متوفر';

            const sortedLessons = [...lessons].sort((a, b) => new Date(b.date) - new Date(a.date));
            const myLessons = lessons.filter(l => l.teacherId === currentUserData?.id);
            const myAssignedStudents = assignments.filter(a => a.teacherId === currentUserData?.id);
            
            const uniqueStudentsForDropdown = [];
            const seenStudentNames = new Set();
            myAssignedStudents.forEach(a => {
                const studentName = getStudentName(a.studentId);
                if (!seenStudentNames.has(studentName) && studentName !== 'طالب غير متوفر') {
                    seenStudentNames.add(studentName);
                    uniqueStudentsForDropdown.push({ id: a.studentId, name: studentName });
                }
            });
            
            const totalAdminHours = lessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 login-page-bg text-right font-black">
                        <div className="login-page-overlay"></div>
                        <div className="max-w-md w-full rounded-[2.5rem] p-8 login-card animate-fade-in shadow-2xl border-t-[10px] border-royal-gold">
                            <div className="text-center mb-8">
                                <Icon name="GraduationCap" size={50} className="mx-auto text-royal-gold mb-2" />
                                <h1 className="text-3xl font-black text-royal-blue tracking-tight uppercase">أكاديمية التفوق</h1>
                                <p className="text-slate-500 text-xs font-black uppercase mt-2">تسجيل الدخول للنظام</p>
                            </div>

                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const u = loginForm.user.trim().toLowerCase();
                                const p = loginForm.pass.trim();
                                let validUser = null;
                                
                                if (u === 'zakiabuillan' && p === '100200300') {
                                    validUser = { id: 'admin', name: 'زكي أبو علان', role: 'admin' };
                                } else {
                                    const t = teachers.find(x => (x.username || '').toLowerCase() === u && x.password === p);
                                    if (t) { validUser = { ...t, role: 'teacher' }; } 
                                }

                                if (validUser) {
                                    setIsLoggedIn(true); 
                                    setCurrentUserData(validUser);
                                    if (rememberMe) {
                                        localStorage.setItem('tafawuq_session_v4', JSON.stringify(validUser));
                                    }
                                } else {
                                    showAlert('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                                }
                            }} className="space-y-5 font-black">
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">اسم المستخدم</label>
                                    <input type="text" className="w-full p-4 rounded-2xl clear-input en-input" placeholder="اسم المستخدم" value={loginForm.user} onChange={e => setLoginForm({...loginForm, user: e.target.value})} autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                </div>
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">كلمة المرور</label>
                                    <div className="relative">
                                        <input type={showPassword ? "text" : "password"} className="w-full p-4 rounded-2xl clear-input en-input" placeholder="••••••••" value={loginForm.pass} onChange={e => setLoginForm({...loginForm, pass: e.target.value})} autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-royal-blue"><Icon name={showPassword ? "EyeOff" : "Eye"} size={22}/></button>
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-start mt-2">
                                    <label className="flex items-center gap-2 cursor-pointer text-sm font-bold text-slate-600 hover:text-[#1a3a5f] transition-colors">
                                        <input type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 cursor-pointer" /> تذكر تسجيل الدخول
                                    </label>
                                </div>

                                <button className="w-full btn-gold py-5 rounded-2xl shadow-xl text-xl flex items-center justify-center gap-3">دخول <Icon name="LogIn" size={24}/></button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-row-reverse bg-slate-50 font-black text-right uppercase">
                    {alert.show && <div className={`alert-toast px-8 py-4 rounded-3xl text-white shadow-2xl flex items-center gap-3 border-b-4 ${alert.type === 'success' ? 'bg-emerald-600 border-emerald-800' : 'bg-red-600 border-red-800'}`}><Icon name="ShieldCheck" size={28} />{alert.msg}</div>}

                    <aside className={`fixed md:relative right-0 top-0 h-screen w-72 flex flex-col p-6 shadow-2xl z-50 bg-[#1a3a5f] text-white ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        <div className="mb-10 text-center border-b border-white/10 pb-6"><h2 className="text-xl text-[#c5a044]">أكاديمية التفوق</h2><p className="text-xs text-slate-300 mt-2">{currentUserData.name}</p></div>
                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <NavItem icon="LayoutDashboard" label="الرئيسية" active={view === 'dashboard'} onClick={() => {setView('dashboard'); setSidebarOpen(false);}} />
                            
                            {/* إضافة زر المساعد الذكي */}
                            <NavItem icon="Bot" label="المساعد الذكي (Gemini)" active={view === 'ai'} onClick={() => {setView('ai'); setSidebarOpen(false);}} />
                            
                            {currentUserData.role === 'admin' && (
                                <>
                                    <NavItem icon="UserPlus" label="إدارة المعلمين" active={view === 'mgmt-teachers'} onClick={() => {setView('mgmt-teachers'); setSidebarOpen(false);}} />
                                    <NavItem icon="Users" label="تسجيل الطلاب" active={view === 'mgmt-students'} onClick={() => {setView('mgmt-students'); setSidebarOpen(false);}} />
                                    <NavItem icon="Link" label="تنسيب الطلاب" active={view === 'assign'} onClick={() => {setView('assign'); setSidebarOpen(false);}} />
                                    <NavItem icon="FileText" label="سجل الحصص العام" active={view === 'reports'} onClick={() => {setView('reports'); setSidebarOpen(false);}} />
                                    <NavItem icon="PieChart" label="التقارير المالية" active={view === 'finance'} onClick={() => {setView('finance'); setSidebarOpen(false);}} />
                                </>
                            )}

                            {currentUserData.role === 'teacher' && (
                                <>
                                    <NavItem icon="PlusSquare" label="تسجيل حصة تعليمية" active={view === 'add-lesson'} onClick={() => {setView('add-lesson'); setSidebarOpen(false);}} />
                                    <NavItem icon="FileText" label="سجل حصصي" active={view === 'reports'} onClick={() => {setView('reports'); setSidebarOpen(false);}} />
                                </>
                            )}
                        </nav>
                        <button onClick={handleLogout} className="mt-auto flex items-center justify-center gap-3 text-red-400 p-4 hover:bg-white/10 rounded-2xl transition-all"><Icon name="LogOut" size={24} /> خروج</button>
                    </aside>

                    <main className="flex-1 p-4 md:p-12 overflow-y-auto w-full">
                        <header className="flex justify-between items-center mb-8 md:hidden">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 bg-royal-blue text-white rounded-xl shadow-lg"><Icon name="Menu" size={24}/></button>
                            <h2 className="text-xl text-slate-800">{view}</h2>
                        </header>

                        {/* --- الواجهة: الرئيسية --- */}
                        {view === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-gold text-center">
                                    <Icon name="Users" className="text-royal-gold mx-auto mb-2" size={40} />
                                    <p className="text-slate-400 text-sm">{currentUserData.role === 'admin' ? "إجمالي الطلاب بالمنصة" : "طلابك المنسوبين"}</p>
                                    <p className="text-4xl text-royal-blue">{currentUserData.role === 'admin' ? students.length : uniqueStudentsForDropdown.length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-blue text-center">
                                    <Icon name="Clock" className="text-royal-blue mx-auto mb-2" size={40} />
                                    <p className="text-slate-400 text-sm">إجمالي الساعات المسجلة</p>
                                    <p className="text-4xl text-royal-gold">{currentUserData.role === 'admin' ? totalAdminHours.toFixed(1) : myLessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0).toFixed(1)}</p>
                                </div>
                            </div>
                        )}

                        {/* --- الواجهة الجديدة: المساعد الذكي (Gemini) --- */}
                        {view === 'ai' && (
                            <div className="animate-fade-in flex flex-col h-[80vh] bg-white rounded-[2rem] shadow-xl border-t-[8px] border-[#1a3a5f] p-8">
                                <h3 className="text-2xl mb-6 text-[#1a3a5f] flex items-center gap-2"><Icon name="Bot" className="text-[#c5a044]" /> المساعد الذكي - Gemini 3 Flash</h3>
                                
                                <div className="flex-1 bg-slate-50 rounded-2xl p-6 mb-4 overflow-y-auto border border-slate-200 text-right leading-relaxed normal-case" dir="rtl">
                                    {aiResponse ? (
                                        <div className="text-slate-800 text-lg whitespace-pre-wrap">{aiResponse}</div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-50">
                                            <Icon name="MessageSquare" size={60} className="mb-4" />
                                            <p>أنا المساعد الذكي للأكاديمية، تفضل بطرح سؤالك...</p>
                                        </div>
                                    )}
                                </div>

                                <form onSubmit={askGemini} className="flex gap-4">
                                    <input 
                                        type="text" 
                                        value={aiInput} 
                                        onChange={e => setAiInput(e.target.value)} 
                                        placeholder="اكتب رسالتك أو سؤالك هنا..." 
                                        className="flex-1 clear-input" 
                                        disabled={isAiLoading}
                                        required 
                                    />
                                    <button 
                                        type="submit" 
                                        disabled={isAiLoading}
                                        className="btn-main px-8 rounded-xl text-lg flex items-center justify-center gap-2 disabled:opacity-50"
                                    >
                                        {isAiLoading ? <span className="animate-pulse">جاري التفكير...</span> : <><Icon name="Send" size={20} /> إرسال</>}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* بقية الواجهات (إدارة المعلمين، الطلاب، التنسيب، الحصص، التقارير) تعمل كالسابق تماماً... */}
                        {view === 'mgmt-teachers' && ( <div className="p-8 text-center text-slate-500">واجهة إدارة المعلمين (تعمل بنفس الكفاءة السابقة)</div> )}
                        {view === 'mgmt-students' && ( <div className="p-8 text-center text-slate-500">واجهة إدارة الطلاب (تعمل بنفس الكفاءة السابقة)</div> )}
                        {view === 'assign' && ( <div className="p-8 text-center text-slate-500">واجهة تنسيب الطلاب (تعمل بنفس الكفاءة السابقة)</div> )}
                        {view === 'add-lesson' && ( <div className="p-8 text-center text-slate-500">واجهة تسجيل حصة (تعمل بنفس الكفاءة السابقة)</div> )}
                        {view === 'reports' && ( <div className="p-8 text-center text-slate-500">واجهة السجلات (تعمل بنفس الكفاءة السابقة)</div> )}
                        {view === 'finance' && ( <div className="p-8 text-center text-slate-500">واجهة التقارير (تعمل بنفس الكفاءة السابقة)</div> )}
                        
                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
