<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية التفوق - النظام المحاسبي السحابي</title>
    
    <!-- استدعاء المكتبات البرمجية الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a044; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; touch-action: manipulation; }
        
        .royal-blue { background-color: #1a3a5f !important; }
        .royal-gold { background-color: #c5a044 !important; }
        .text-royal-blue { color: #1a3a5f !important; }
        .text-royal-gold { color: #c5a044 !important; }
        
        aside { background-color: #1a3a5f !important; color: white !important; box-shadow: -10px 0 40px rgba(0,0,0,0.3); }
        .sidebar-item-active { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; }
        
        .login-page-bg { background-color: #f1f5f9; }
        .login-page-overlay { background: rgba(241, 245, 249, 0.96); position: absolute; inset: 0; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: #ffffff; border: 3px solid #1a3a5f; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.35); border-radius: 2.5rem; }

        .clear-input { border: 2px solid #1a3a5f !important; color: #000000 !important; font-weight: 800 !important; background: #ffffff !important; border-radius: 1rem !important; outline: none;}
        .clear-input:focus { box-shadow: 0 0 0 3px rgba(197, 160, 68, 0.5) !important; }
        .en-input { direction: ltr !important; text-align: left !important; }

        .alert-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 3000; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 25px; opacity: 1; } }

        .btn-gold { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; border-radius: 1rem; transition: all 0.3s; }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 1rem; border: 1px solid #e2e8f0; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- منطقة تفعيل قاعدة البيانات (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === ضع مفاتيح FIREBASE الخاصة بك هنا ===
        const firebaseConfig = {
            apiKey: "ضع_الكود_الخاص_بك_هنا",
            authDomain: "ضع_رابط_الدومين_هنا",
            projectId: "ضع_رقم_المشروع_هنا",
            storageBucket: "ضع_رابط_التخزين_هنا",
            messagingSenderId: "ضع_رقم_المرسل_هنا",
            appId: "ضع_رقم_التطبيق_هنا"
        };
        // ========================================

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.fb = { db, doc, setDoc, collection, onSnapshot, deleteDoc };
        } catch (error) {
            console.error("خطأ في الاتصال بقاعدة البيانات:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 32, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconElement = document.createElement('i');
                        const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        iconElement.setAttribute('data-lucide', lucideName);
                        iconElement.style.width = `${size}px`;
                        iconElement.style.height = `${size}px`;
                        iconRef.current.appendChild(iconElement);
                        window.lucide.createIcons();
                    }
                };
                render();
                const timeout = setTimeout(render, 100);
                return () => clearTimeout(timeout);
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}}></span>;
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 ${active ? 'sidebar-item-active shadow-xl' : 'hover:bg-white/10 text-white/80 font-bold'}`}>
                <Icon name={icon} size={26} className={active ? 'text-[#1a3a5f]' : 'text-[#c5a044]'} />
                <span className="text-[17px] tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => {
                return !!localStorage.getItem('tafawuq_active_session');
            });
            const [currentUserData, setCurrentUserData] = useState(() => {
                const saved = localStorage.getItem('tafawuq_active_session');
                return saved ? JSON.parse(saved) : null;
            });

            const [view, setView] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [alert, setAlert] = useState({ show: false, msg: '', type: 'success' });
            const [isSyncing, setIsSyncing] = useState(true);

            const [teachers, setTeachers] = useState([]);
            const [students, setStudents] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [lessons, setLessons] = useState([]);
            
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [showPassword, setShowPassword] = useState(false);
            const [rememberMe, setRememberMe] = useState(true); 

            const [editingTeacher, setEditingTeacher] = useState(null);
            const [editingStudent, setEditingStudent] = useState(null);
            const [editingAssignment, setEditingAssignment] = useState(null);

            useEffect(() => {
                if (window.fb && window.fb.db) {
                    const { db, collection, onSnapshot } = window.fb;
                    const syncData = (collectionName, setterFunction) => {
                        const colRef = collection(db, collectionName);
                        return onSnapshot(colRef, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setterFunction(data);
                            setIsSyncing(false);
                        }, (error) => {
                            console.error(`خطأ:`, error);
                            setIsSyncing(false);
                        });
                    };
                    const unsubTeachers = syncData('teachers', setTeachers);
                    const unsubStudents = syncData('students', setStudents);
                    const unsubAssignments = syncData('assignments', setAssignments);
                    const unsubLessons = syncData('lessons', setLessons);

                    return () => { unsubTeachers(); unsubStudents(); unsubAssignments(); unsubLessons(); };
                } else {
                    setTimeout(() => setIsSyncing(false), 2000);
                }
            }, []);

            const dbOp = async (collectionName, data, documentId = null) => {
                if (!window.fb || !window.fb.db) {
                    showAlert('قاعدة البيانات غير مفعلة، يرجى وضع المفاتيح في الكود.', 'error');
                    return false;
                }
                try {
                    const { db, doc, setDoc, deleteDoc } = window.fb;
                    const id = documentId || Date.now().toString(); 
                    const docRef = doc(db, collectionName, id);

                    if (data === null) {
                        await deleteDoc(docRef);
                        showAlert('تم الحذف بنجاح!');
                    } else {
                        await setDoc(docRef, { ...data, updatedAt: new Date().toISOString() }, { merge: true });
                        showAlert('تم حفظ البيانات بنجاح!');
                    }
                    return true;
                } catch (error) {
                    showAlert('حدث خطأ أثناء الاتصال بالخادم.', 'error');
                    return false;
                }
            };

            const showAlert = (msg, type = 'success') => {
                setAlert({ show: true, msg, type });
                setTimeout(() => setAlert({ show: false, msg: '', type: 'success' }), 3000);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserData(null);
                localStorage.removeItem('tafawuq_active_session'); 
            };

            const getStudentName = (id) => students.find(s => s.id === id)?.name || 'طالب محذوف';
            const getTeacherName = (id) => teachers.find(t => t.id === id)?.name || 'معلم محذوف';

            const sortedLessons = [...lessons].sort((a, b) => new Date(b.date) - new Date(a.date));
            const myLessons = lessons.filter(l => l.teacherId === currentUserData?.id);
            
            const myAssignedStudents = assignments.filter(a => a.teacherId === currentUserData?.id);
            const uniqueStudentsForDropdown = [];
            const seenStudentNames = new Set();
            
            myAssignedStudents.forEach(a => {
                const studentName = getStudentName(a.studentId);
                if (!seenStudentNames.has(studentName) && studentName !== 'طالب محذوف') {
                    seenStudentNames.add(studentName);
                    uniqueStudentsForDropdown.push({ id: a.studentId, name: studentName });
                }
            });
            
            const totalAdminHours = lessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0);

            if (isSyncing) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#1a3a5f] text-white font-black">
                        <Icon name="Cloud" size={60} className="text-[#c5a044] mb-4 animate-pulse" />
                        <div className="text-xl tracking-widest uppercase">جاري الاتصال بقاعدة البيانات السحابية...</div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 login-page-bg text-right font-black">
                        <div className="login-page-overlay"></div>
                        <div className="max-w-md w-full rounded-[2.5rem] p-8 login-card animate-fade-in shadow-2xl border-t-[10px] border-royal-gold">
                            <div className="text-center mb-8">
                                <Icon name="GraduationCap" size={50} className="mx-auto text-royal-gold mb-2" />
                                <h1 className="text-3xl font-black text-royal-blue tracking-tight uppercase">أكاديمية التفوق</h1>
                                <p className="text-slate-500 text-xs font-black uppercase mt-2">تسجيل الدخول للنظام السحابي</p>
                            </div>
                            
                            {!window.fb?.db && (
                                <div className="mb-6 p-4 bg-red-50 border-r-4 border-red-500 text-red-700 text-xs rounded-lg">
                                    تنبيه: قاعدة بيانات Firebase غير مفعلة. يرجى مراجعة المفاتيح.
                                </div>
                            )}

                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const u = loginForm.user.trim().toLowerCase();
                                const p = loginForm.pass.trim();
                                let validUser = null;
                                
                                if (u === 'zakiabuillan' && p === '100200300') {
                                    validUser = { id: 'admin', name: 'زكي أبو علان', role: 'admin' };
                                } else {
                                    const t = teachers.find(x => (x.username || '').toLowerCase() === u && x.password === p);
                                    if (t) { validUser = { ...t, role: 'teacher' }; } 
                                }

                                if (validUser) {
                                    setIsLoggedIn(true); 
                                    setCurrentUserData(validUser);
                                    if (rememberMe) {
                                        localStorage.setItem('tafawuq_active_session', JSON.stringify(validUser));
                                    }
                                } else {
                                    showAlert('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                                }
                            }} className="space-y-5 font-black">
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">اسم المستخدم</label>
                                    <input type="text" className="w-full p-4 rounded-2xl clear-input en-input" placeholder="اسم المستخدم" value={loginForm.user} onChange={e => setLoginForm({...loginForm, user: e.target.value})} autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                </div>
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">كلمة المرور</label>
                                    <div className="relative">
                                        <input type={showPassword ? "text" : "password"} className="w-full p-4 rounded-2xl clear-input en-input" placeholder="••••••••" value={loginForm.pass} onChange={e => setLoginForm({...loginForm, pass: e.target.value})} autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-royal-blue"><Icon name={showPassword ? "EyeOff" : "Eye"} size={22}/></button>
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-start mt-2">
                                    <label className="flex items-center gap-2 cursor-pointer text-sm font-bold text-slate-600 hover:text-[#1a3a5f] transition-colors">
                                        <input type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 cursor-pointer" /> تذكر تسجيل الدخول
                                    </label>
                                </div>

                                <button className="w-full btn-gold py-5 rounded-2xl shadow-xl text-xl flex items-center justify-center gap-3">دخول <Icon name="LogIn" size={24}/></button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-row-reverse bg-slate-50 font-black text-right uppercase">
                    {alert.show && <div className={`alert-toast px-8 py-4 rounded-3xl text-white shadow-2xl flex items-center gap-3 border-b-4 ${alert.type === 'success' ? 'bg-emerald-600 border-emerald-800' : 'bg-red-600 border-red-800'}`}><Icon name="ShieldCheck" size={28} />{alert.msg}</div>}

                    <aside className={`fixed md:relative right-0 top-0 h-screen w-72 flex flex-col p-6 shadow-2xl z-50 bg-[#1a3a5f] text-white ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        <div className="mb-10 text-center border-b border-white/10 pb-6"><h2 className="text-xl text-[#c5a044]">أكاديمية التفوق</h2><p className="text-xs text-slate-300 mt-2">{currentUserData.name}</p></div>
                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <NavItem icon="LayoutDashboard" label="الرئيسية" active={view === 'dashboard'} onClick={() => {setView('dashboard'); setSidebarOpen(false);}} />
                            {currentUserData.role === 'admin' && (
                                <>
                                    <NavItem icon="UserPlus" label="المعلمين" active={view === 'mgmt-teachers'} onClick={() => {setView('mgmt-teachers'); setEditingTeacher(null); setSidebarOpen(false);}} />
                                    <NavItem icon="Users" label="الطلاب" active={view === 'mgmt-students'} onClick={() => {setView('mgmt-students'); setEditingStudent(null); setSidebarOpen(false);}} />
                                    <NavItem icon="Link" label="التنسيب" active={view === 'assign'} onClick={() => {setView('assign'); setEditingAssignment(null); setSidebarOpen(false);}} />
                                    <NavItem icon="PieChart" label="التقارير المالية" active={view === 'finance'} onClick={() => {setView('finance'); setSidebarOpen(false);}} />
                                </>
                            )}
                            {currentUserData.role === 'teacher' && (
                                <NavItem icon="PlusSquare" label="تسجيل حصة جديدة" active={view === 'add-lesson'} onClick={() => {setView('add-lesson'); setSidebarOpen(false);}} />
                            )}
                            <NavItem icon="FileText" label={currentUserData.role === 'admin' ? "سجل الحصص العام" : "سجل حصصي"} active={view === 'reports'} onClick={() => {setView('reports'); setSidebarOpen(false);}} />
                        </nav>
                        <button onClick={handleLogout} className="mt-auto flex items-center justify-center gap-3 text-red-400 p-4 hover:bg-white/10 rounded-2xl transition-all"><Icon name="LogOut" size={24} /> خروج</button>
                    </aside>

                    <main className="flex-1 p-4 md:p-12 overflow-y-auto w-full">
                        <header className="flex justify-between items-center mb-8 md:hidden">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 bg-royal-blue text-white rounded-xl shadow-lg"><Icon name="Menu" size={24}/></button>
                            <h2 className="text-xl text-slate-800">{view}</h2>
                        </header>

                        {view === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-gold text-center">
                                    <Icon name="Users" className="text-royal-gold mx-auto mb-2" size={40} />
                                    <p className="text-slate-400 text-sm">{currentUserData.role === 'admin' ? "إجمالي الطلاب" : "طلابك المنسوبين"}</p>
                                    <p className="text-4xl text-royal-blue">{currentUserData.role === 'admin' ? students.length : uniqueStudentsForDropdown.length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-blue text-center">
                                    <Icon name="Clock" className="text-royal-blue mx-auto mb-2" size={40} />
                                    <p className="text-slate-400 text-sm">إجمالي الساعات المسجلة</p>
                                    <p className="text-4xl text-royal-gold">{currentUserData.role === 'admin' ? totalAdminHours.toFixed(1) : myLessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0).toFixed(1)}</p>
                                </div>
                            </div>
                        )}

                        {view === 'mgmt-teachers' && currentUserData.role === 'admin' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className={`bg-white p-8 rounded-[2rem] shadow-xl border-t-[8px] ${editingTeacher ? 'border-[#c5a044] bg-amber-50' : 'border-[#1a3a5f]'}`}>
                                    <h3 className="text-2xl mb-6 text-[#1a3a5f] flex items-center gap-2"><Icon name={editingTeacher ? "Edit" : "UserPlus"} className="text-[#c5a044]" /> {editingTeacher ? "تعديل المعلم" : "إضافة معلم"}</h3>
                                    <form key={editingTeacher ? editingTeacher.id : 'new'} className="space-y-4" onSubmit={async (e) => {
                                        e.preventDefault();
                                        const f = e.target.elements;
                                        const cleanUsername = f.user.value.trim().toLowerCase();
                                        
                                        if (!editingTeacher && teachers.some(t => t.username === cleanUsername)) {
                                            showAlert('تنبيه: اسم المستخدم هذا موجود مسبقاً!', 'error'); return;
                                        }
                                        const data = { name: f.name.value.trim(), rate: parseFloat(f.rate.value), username: cleanUsername, password: f.pass.value.trim() };
                                        const success = await dbOp('teachers', data, editingTeacher?.id);
                                        if (success) { e.target.reset(); setEditingTeacher(null); }
                                    }}>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <input name="name" defaultValue={editingTeacher?.name || ''} placeholder="اسم المعلم" className="w-full clear-input" required />
                                            <input name="rate" type="number" defaultValue={editingTeacher?.rate || ''} placeholder="أجر الساعة (₪)" className="w-full clear-input en-input" required />
                                            <input name="user" defaultValue={editingTeacher?.username || ''} placeholder="اسم المستخدم" className="w-full clear-input en-input" autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                            <input name="pass" type="text" defaultValue={editingTeacher?.password || ''} placeholder="كلمة المرور" className="w-full clear-input en-input" autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                        </div>
                                        <div className="flex gap-4 mt-4">
                                            <button className="flex-1 btn-gold py-4 rounded-xl text-lg">{editingTeacher ? "حفظ التعديلات" : "إضافة المعلم"}</button>
                                            {editingTeacher && <button type="button" onClick={() => setEditingTeacher(null)} className="px-8 bg-slate-200 text-slate-700 rounded-xl">إلغاء</button>}
                                        </div>
                                    </form>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b"><h3 className="text-xl font-black">قائمة المعلمين</h3></div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right">
                                            <thead className="bg-slate-100 border-b"><tr><th className="p-4">الاسم</th><th className="p-4">User/Pass</th><th className="p-4 text-center">أجر الساعة</th><th className="p-4 text-center">إجراء</th></tr></thead>
                                            <tbody>
                                                {teachers.map(t => (
                                                    <tr key={t.id} className="border-b hover:bg-slate-50">
                                                        <td className="p-4 font-bold">{t.name}</td>
                                                        <td className="p-4 text-slate-500 en-input">{t.username} / {t.password}</td>
                                                        <td className="p-4 text-center font-bold text-[#c5a044]">{t.rate} ₪</td>
                                                        <td className="p-4 text-center flex justify-center gap-3">
                                                            <button onClick={() => { setEditingTeacher(t); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-blue-500 hover:text-blue-700"><Icon name="Edit" size={20} /></button>
                                                            <button onClick={() => { if(confirm('حذف؟')) dbOp('teachers', null, t.id); }} className="text-red-500 hover:text-red-700"><Icon name="Trash2" size={20} /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {teachers.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">لا يوجد بيانات</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'mgmt-students' && currentUserData.role === 'admin' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className={`bg-white p-8 rounded-[2rem] shadow-xl border-t-[8px] ${editingStudent ? 'border-[#c5a044] bg-amber-50' : 'border-[#1a3a5f]'}`}>
                                    <h3 className="text-2xl mb-6 text-[#1a3a5f] flex items-center gap-2"><Icon name={editingStudent ? "Edit" : "UserPlus"} className="text-[#c5a044]" /> {editingStudent ? "تعديل طالب" : "إضافة طالب"}</h3>
                                    <form key={editingStudent ? editingStudent.id : 'new'} className="flex flex-col md:flex-row gap-4" onSubmit={async (e) => {
                                        e.preventDefault();
                                        const name = e.target.name.value.trim();
                                        if (!editingStudent && students.some(s => s.name === name)) {
                                            showAlert('تنبيه: اسم الطالب مسجل مسبقاً!', 'error'); return;
                                        }
                                        const success = await dbOp('students', { name }, editingStudent?.id);
                                        if(success) { e.target.reset(); setEditingStudent(null); }
                                    }}>
                                        <input name="name" defaultValue={editingStudent?.name || ''} placeholder="اسم الطالب" className="flex-1 clear-input" required />
                                        <button className="btn-gold px-8 py-4 rounded-xl text-lg w-full md:w-auto">{editingStudent ? "حفظ" : "تسجيل"}</button>
                                        {editingStudent && <button type="button" onClick={() => setEditingStudent(null)} className="px-8 bg-slate-200 text-slate-700 rounded-xl">إلغاء</button>}
                                    </form>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b"><h3 className="text-xl font-black">الطلاب المسجلون</h3></div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right">
                                            <thead className="bg-slate-100 border-b"><tr><th className="p-4">اسم الطالب</th><th className="p-4 text-center">إجراء</th></tr></thead>
                                            <tbody>
                                                {students.map(s => (
                                                    <tr key={s.id} className="border-b hover:bg-slate-50">
                                                        <td className="p-4 font-bold">{s.name}</td>
                                                        <td className="p-4 text-center flex justify-center gap-3">
                                                            <button onClick={() => { setEditingStudent(s); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-blue-500"><Icon name="Edit" size={20} /></button>
                                                            <button onClick={() => { if(confirm('حذف؟')) dbOp('students', null, s.id); }} className="text-red-500"><Icon name="Trash2" size={20} /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {students.length === 0 && <tr><td colSpan="2" className="p-8 text-center text-slate-400">لا يوجد بيانات</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'assign' && currentUserData.role === 'admin' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className={`bg-white p-8 rounded-[2rem] shadow-xl border-t-[8px] ${editingAssignment ? 'border-[#c5a044] bg-amber-50' : 'border-[#1a3a5f]'}`}>
                                    <h3 className="text-2xl mb-6 text-[#1a3a5f] flex items-center gap-2"><Icon name="Link" className="text-[#c5a044]" /> {editingAssignment ? "تعديل التنسيب" : "تنسيب طالب لمعلم"}</h3>
                                    <form key={editingAssignment ? editingAssignment.id : 'new'} className="space-y-4" onSubmit={async (e) => {
                                        e.preventDefault();
                                        const teacherId = e.target.teacherId.value;
                                        const studentId = e.target.studentId.value;
                                        
                                        if (!editingAssignment) {
                                            const isDuplicate = assignments.some(a => a.teacherId === teacherId && a.studentId === studentId);
                                            if (isDuplicate) {
                                                showAlert('تنبيه: هذا الطالب منسوب بالفعل لهذا المعلم مسبقاً!', 'error'); return; 
                                            }
                                        }

                                        const success = await dbOp('assignments', { teacherId, studentId }, editingAssignment?.id);
                                        if(success) { setEditingAssignment(null); }
                                    }}>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <select name="teacherId" defaultValue={editingAssignment?.teacherId || ''} className="w-full clear-input bg-white" required><option value="">-- اختر المعلم --</option>{teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>
                                            <select name="studentId" defaultValue={editingAssignment?.studentId || ''} className="w-full clear-input bg-white" required><option value="">-- اختر الطالب --</option>{students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                                        </div>
                                        <div className="flex gap-4 mt-4">
                                            <button className="flex-1 btn-gold py-4 rounded-xl text-lg">{editingAssignment ? "حفظ التعديلات" : "إتمام التنسيب"}</button>
                                            {editingAssignment && <button type="button" onClick={() => setEditingAssignment(null)} className="px-8 bg-slate-200 text-slate-700 rounded-xl">إلغاء</button>}
                                        </div>
                                    </form>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <div className="p-6 bg-slate-50 border-b"><h3 className="text-xl font-black">التنسيبات الحالية</h3></div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right">
                                            <thead className="bg-slate-100 border-b"><tr><th className="p-4">المعلم</th><th className="p-4">الطالب المنسوب</th><th className="p-4 text-center">إجراء</th></tr></thead>
                                            <tbody>
                                                {assignments.map(a => (
                                                    <tr key={a.id} className="border-b hover:bg-slate-50">
                                                        <td className="p-4 font-bold text-[#1a3a5f]">{getTeacherName(a.teacherId)}</td>
                                                        <td className="p-4">{getStudentName(a.studentId)}</td>
                                                        <td className="p-4 text-center flex justify-center gap-3">
                                                            <button onClick={() => { setEditingAssignment(a); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-blue-500"><Icon name="Edit" size={20} /></button>
                                                            <button onClick={() => { if(confirm('إلغاء التنسيب؟')) dbOp('assignments', null, a.id); }} className="text-red-500"><Icon name="Trash2" size={20} /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {assignments.length === 0 && <tr><td colSpan="3" className="p-8 text-center text-slate-400">لا يوجد بيانات</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'add-lesson' && currentUserData.role === 'teacher' && (
                            <div className="max-w-xl mx-auto bg-white p-8 rounded-[2rem] shadow-xl border-t-[8px] border-[#c5a044] animate-fade-in">
                                <h3 className="text-2xl mb-8 text-[#1a3a5f] text-center flex items-center justify-center gap-2"><Icon name="PlusSquare" className="text-[#c5a044]" /> تسجيل حصة تعليمية</h3>
                                <form className="space-y-5" onSubmit={async (e) => {
                                    e.preventDefault();
                                    const f = e.target.elements;
                                    const data = { teacherId: currentUserData.id, studentId: f.studentId.value, subject: f.subject.value, hours: Number(f.hours.value), mins: Number(f.mins.value), date: f.date.value };
                                    const success = await dbOp('lessons', data);
                                    if(success) { e.target.reset(); setView('reports'); }
                                }}>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-500 mb-2">الطالب المنسوب لك</label>
                                        <select name="studentId" className="w-full clear-input bg-white" required>
                                            <option value="">-- اختر الطالب --</option>
                                            {uniqueStudentsForDropdown.map(student => (
                                                <option key={student.id} value={student.id}>{student.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div><label className="block text-sm font-bold text-slate-500 mb-2">المادة الدراسية</label><input name="subject" className="w-full clear-input" required /></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-bold text-slate-500 mb-2 text-center">ساعات</label><input name="hours" type="number" min="0" className="w-full clear-input text-center text-xl font-bold" defaultValue="0" required /></div>
                                        <div><label className="block text-sm font-bold text-slate-500 mb-2 text-center">دقائق</label><input name="mins" type="number" min="0" max="59" className="w-full clear-input text-center text-xl font-bold" defaultValue="0" required /></div>
                                    </div>
                                    <div><label className="block text-sm font-bold text-slate-500 mb-2">تاريخ الحصة</label><input name="date" type="date" className="w-full clear-input text-center" defaultValue={new Date().toISOString().split('T')[0]} required /></div>
                                    <button className="w-full btn-gold py-5 rounded-2xl text-xl mt-4">إرسال واعتماد الحصة</button>
                                </form>
                            </div>
                        )}

                        {view === 'reports' && (
                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border animate-fade-in">
                                <div className="bg-[#1a3a5f] text-white p-6 border-b flex justify-between items-center">
                                    <h3 className="text-xl font-black flex items-center gap-2"><Icon name="FileText" className="text-[#c5a044]"/>{currentUserData.role === 'admin' ? 'السجل العام' : 'سجل حصصي'}</h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-right text-sm">
                                        <thead className="bg-slate-100 border-b"><tr><th className="p-4">التاريخ</th>{currentUserData.role === 'admin' && <th className="p-4">المعلم</th>}<th className="p-4">الطالب</th><th className="p-4">المادة</th><th className="p-4 text-center">المدة</th>{currentUserData.role === 'admin' && <th className="p-4 text-center">إجراء</th>}</tr></thead>
                                        <tbody>
                                            {sortedLessons.filter(l => currentUserData.role === 'admin' || l.teacherId === currentUserData.id).map(l => (
                                                <tr key={l.id} className="border-b hover:bg-slate-50">
                                                    <td className="p-4 text-slate-500 font-bold" dir="ltr">{l.date}</td>
                                                    {currentUserData.role === 'admin' && <td className="p-4 font-bold text-[#1a3a5f]">{getTeacherName(l.teacherId)}</td>}
                                                    <td className="p-4">{getStudentName(l.studentId)}</td>
                                                    <td className="p-4">{l.subject}</td>
                                                    <td className="p-4 text-center font-bold text-blue-700">{l.hours}س و {l.mins}د</td>
                                                    {currentUserData.role === 'admin' && <td className="p-4 text-center"><button onClick={() => { if(confirm('حذف الحصة؟')) dbOp('lessons', null, l.id); }} className="text-red-500"><Icon name="Trash2" size={18} /></button></td>}
                                                </tr>
                                            ))}
                                            {sortedLessons.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-slate-400">لا توجد حصص مسجلة</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'finance' && currentUserData.role === 'admin' && (
                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border animate-fade-in">
                                <div className="p-6 bg-slate-50 border-b"><h3 className="text-xl font-black">التقرير المالي المستحق</h3></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-right">
                                        <thead className="bg-slate-100 border-b"><tr><th className="p-4">اسم المعلم</th><th className="p-4 text-center">أجر الساعة</th><th className="p-4 text-center">إجمالي الساعات</th><th className="p-4 text-left">المبلغ المستحق</th></tr></thead>
                                        <tbody>
                                            {teachers.map(t => {
                                                const tLessons = lessons.filter(l => l.teacherId === t.id);
                                                const tHours = tLessons.reduce((sum, l) => sum + Number(l.hours) + (Number(l.mins) / 60), 0);
                                                const tPayout = Math.round(tHours * (t.rate || 0));
                                                return (
                                                    <tr key={t.id} className="border-b hover:bg-slate-50">
                                                        <td className="p-4 font-bold text-lg">{t.name}</td>
                                                        <td className="p-4 text-center">{t.rate || 0} ₪</td>
                                                        <td className="p-4 text-center font-bold" dir="ltr">{tHours.toFixed(2)}</td>
                                                        <td className="p-4 text-left font-black text-[#c5a044] text-xl">{tPayout} ₪</td>
                                                    </tr>
                                                );
                                            })}
                                            {teachers.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">لا يوجد معلمون</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
