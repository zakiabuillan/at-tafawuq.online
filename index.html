<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- منع الهاتف من عمل تقريب (Zoom) عند الكتابة للحفاظ على شكل الواجهة -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أكاديمية التفوق - النظام المحاسبي الذكي</title>
    
    <!-- المكتبات الأساسية -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a044; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; touch-action: manipulation; }
        
        .royal-blue { background-color: #1a3a5f !important; }
        .royal-gold { background-color: #c5a044 !important; }
        .text-royal-blue { color: #1a3a5f !important; }
        .text-royal-gold { color: #c5a044 !important; }
        
        aside { background-color: #1a3a5f !important; color: white !important; box-shadow: -10px 0 40px rgba(0,0,0,0.3); }
        .sidebar-item-active { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; }
        
        .login-page-bg { background-color: #f1f5f9; }
        .login-page-overlay { background: rgba(241, 245, 249, 0.96); position: absolute; inset: 0; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: #ffffff; border: 3px solid #1a3a5f; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.35); border-radius: 2.5rem; }

        .clear-input { border: 2px solid #1a3a5f !important; color: #000000 !important; font-weight: 800 !important; background: #ffffff !important; border-radius: 1rem !important; }
        .en-input { direction: ltr !important; text-align: left !important; }

        .alert-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 3000; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 25px; opacity: 1; } }

        .btn-gold { background-color: #c5a044 !important; color: #1a3a5f !important; font-weight: 900 !important; border-radius: 1rem; }
        .btn-whatsapp { background-color: #25d366 !important; color: white !important; font-weight: 900 !important; border-radius: 1rem; }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 1rem; border: 1px solid #e2e8f0; }
        button, input, select { min-height: 52px; outline: none; transition: all 0.2s; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 2000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // حفظنا الأدوات في النافذة لاستخدامها داخل React
        window.fb = { initializeApp, getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const MANAGER_PHONE = "972509329568"; 

        // محرك الأيقونات
        const Icon = ({ name, size = 32, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const render = () => {
                    if (window.lucide && iconRef.current) {
                        iconRef.current.innerHTML = '';
                        const iconElement = document.createElement('i');
                        const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        iconElement.setAttribute('data-lucide', lucideName);
                        iconElement.style.width = `${size}px`;
                        iconElement.style.height = `${size}px`;
                        iconRef.current.appendChild(iconElement);
                        window.lucide.createIcons();
                    }
                };
                render();
                const timeout = setTimeout(render, 100);
                return () => clearTimeout(timeout);
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}}></span>;
        };

        const NavItem = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full text-right p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 ${active ? 'sidebar-item-active shadow-xl' : 'hover:bg-white/10 text-white/80 font-bold'}`}>
                <Icon name={icon} size={26} className={active ? 'text-[#1a3a5f]' : 'text-[#c5a044]'} />
                <span className="text-[17px] tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isOffline, setIsOffline] = useState(true); // افتراضياً أوفلاين حتى يتم إضافة إعدادات قاعدة البيانات
            const [currentUserData, setCurrentUserData] = useState(null);
            const [loginRole, setLoginRole] = useState('admin');
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [showPassword, setShowPassword] = useState(false);
            const [view, setView] = useState('dashboard');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [alert, setAlert] = useState({ show: false, msg: '', type: 'success' });

            const [teachers, setTeachers] = useState([]);
            const [students, setStudents] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [lessons, setLessons] = useState([]);
            
            // --- دالة تحميل البيانات المحلية (تعمل على مستوى الجهاز الواحد) ---
            const loadLocalData = () => {
                const get = (key) => JSON.parse(localStorage.getItem(`tafawuq_v3_${key}`) || '[]');
                setTeachers(get('teachers'));
                setStudents(get('students'));
                setAssignments(get('assignments'));
                setLessons(get('lessons'));
            };

            const saveLocalData = (key, data) => {
                localStorage.setItem(`tafawuq_v3_${key}`, JSON.stringify(data));
            };

            useEffect(() => {
                // نقوم بتحميل البيانات المحفوظة في الجهاز عند فتح الصفحة
                loadLocalData();
                
                // 💡 ملاحظة هامة: لكي تشارك البيانات بين الهاتف والحاسوب، يجب استبدال {} بإعدادات Firebase الخاصة بك
                const firebaseConfig = {
                    // apiKey: "YOUR_API_KEY",
                    // authDomain: "YOUR_AUTH_DOMAIN",
                    // projectId: "YOUR_PROJECT_ID"
                };

                // إذا قمت بوضع إعدادات حقيقية، سيتم تفعيل المزامنة
                if (firebaseConfig.apiKey) {
                    try {
                        const app = window.fb.initializeApp(firebaseConfig);
                        setIsOffline(false);
                    } catch (e) { console.log("تشغيل محلي (بدون انترنت)"); }
                }
            }, []);

            const showAlert = (msg, type = 'success') => {
                setAlert({ show: true, msg, type });
                setTimeout(() => setAlert({ show: false, msg: '', type: 'success' }), 3000);
            };

            const dbOp = async (col, data, id = null) => {
                let currentItems = col === 'teachers' ? [...teachers] : col === 'students' ? [...students] : col === 'assignments' ? [...assignments] : [...lessons];
                let updatedItems = [];
                const targetId = id || (Date.now().toString());

                if (id) {
                    if (!data) updatedItems = currentItems.filter(x => x.id !== id);
                    else updatedItems = currentItems.map(x => x.id === id ? { ...x, ...data } : x);
                } else {
                    updatedItems = [...currentItems, { ...data, id: targetId, createdAt: new Date().toISOString() }];
                }

                // تحديث الذاكرة والواجهة
                if (col === 'teachers') setTeachers(updatedItems);
                else if (col === 'students') setStudents(updatedItems);
                else if (col === 'assignments') setAssignments(updatedItems);
                else setLessons(updatedItems);
                
                saveLocalData(col, updatedItems);
                return true;
            };

            // واجهة تسجيل الدخول
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 login-page-bg text-right font-black">
                        <div className="login-page-overlay"></div>
                        <div className="max-w-md w-full rounded-[2.5rem] p-8 login-card animate-fade-in shadow-2xl border-t-[10px] border-royal-gold">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-black text-royal-blue tracking-tight uppercase">أكاديمية التفوق</h1>
                                <p className="text-royal-gold text-xs font-black uppercase mt-2">تسجيل الدخول للنظام</p>
                            </div>
                            <div className="flex bg-slate-100 p-2 rounded-2xl mb-8 border-2 font-black">
                                <button onClick={() => setLoginRole('admin')} className={`flex-1 py-3 rounded-xl text-sm transition-all ${loginRole === 'admin' ? 'bg-[#1a3a5f] text-white shadow-lg' : 'text-slate-500'}`}>المدير العام</button>
                                <button onClick={() => setLoginRole('teacher')} className={`flex-1 py-3 rounded-xl text-sm transition-all ${loginRole === 'teacher' ? 'bg-[#1a3a5f] text-white shadow-lg' : 'text-slate-500'}`}>المعلم</button>
                            </div>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                // إزالة الفراغات وتحويل الحروف إلى صغيرة لتجنب أخطاء لوحة مفاتيح الهاتف
                                const u = loginForm.user.trim().toLowerCase();
                                const p = loginForm.pass.trim();
                                
                                // بياناتك كمدير منصة (ثابتة وآمنة)
                                if (loginRole === 'admin' && u === 'zakiabuillan' && p === '100200300') {
                                    setIsLoggedIn(true); 
                                    setCurrentUserData({ id: 'admin', name: 'زكي أبو علان', role: 'admin' });
                                } else if (loginRole === 'teacher') {
                                    // البحث عن المعلم مع معالجة الأخطاء المحتملة للبيانات الفارغة
                                    const t = teachers.find(x => (x.username || '').trim().toLowerCase() === u && (x.password || '').trim() === p);
                                    if (t) { 
                                        setIsLoggedIn(true); 
                                        setCurrentUserData({ ...t, role: 'teacher' }); 
                                    } else {
                                        showAlert('بيانات دخول المعلم غير صحيحة', 'error');
                                    }
                                } else {
                                    showAlert('بيانات الدخول غير صحيحة', 'error');
                                }
                            }} className="space-y-5 font-black">
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">اسم المستخدم</label>
                                    {/* تمت إضافة أوامر لمنع الهاتف من تعديل النص التلقائي */}
                                    <input 
                                        type="text" 
                                        className="w-full p-4 rounded-2xl clear-input en-input" 
                                        placeholder="Username" 
                                        value={loginForm.user} 
                                        onChange={e => setLoginForm({...loginForm, user: e.target.value})} 
                                        autocapitalize="none" 
                                        autocomplete="off" 
                                        autocorrect="off" 
                                        required 
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-royal-blue pr-2 mb-1">كلمة المرور</label>
                                    <div className="relative">
                                        <input 
                                            type={showPassword ? "text" : "password"} 
                                            className="w-full p-4 rounded-2xl clear-input en-input" 
                                            placeholder="••••••••" 
                                            value={loginForm.pass} 
                                            onChange={e => setLoginForm({...loginForm, pass: e.target.value})} 
                                            autocapitalize="none" 
                                            autocomplete="off" 
                                            autocorrect="off" 
                                            required 
                                        />
                                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-royal-blue"><Icon name={showPassword ? "EyeOff" : "Eye"} size={22}/></button>
                                    </div>
                                </div>
                                <button className="w-full btn-gold py-5 rounded-2xl shadow-xl text-xl flex items-center justify-center gap-3">دخول النظام <Icon name="LogIn" size={24}/></button>
                            </form>
                        </div>
                    </div>
                );
            }

            // واجهة لوحة التحكم
            return (
                <div className="min-h-screen flex flex-row-reverse bg-slate-50 font-black text-right uppercase">
                    {alert.show && <div className={`alert-toast px-8 py-4 rounded-3xl text-white shadow-2xl flex items-center gap-3 border-b-4 ${alert.type === 'success' ? 'bg-emerald-600 border-emerald-800' : 'bg-red-600 border-red-800'}`}><Icon name="ShieldCheck" size={28} />{alert.msg}</div>}

                    <aside className={`fixed md:relative right-0 top-0 h-screen w-72 flex flex-col p-6 shadow-2xl z-50 bg-[#1a3a5f] text-white ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        <div className="mb-10 text-center border-b border-white/10 pb-6"><h2 className="text-xl text-[#c5a044]">أكاديمية التفوق</h2><p className="text-xs text-slate-300 mt-2">{currentUserData.name}</p></div>
                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <NavItem icon="LayoutDashboard" label="الرئيسية" active={view === 'dashboard'} onClick={() => {setView('dashboard'); setSidebarOpen(false);}} />
                            {currentUserData.role === 'admin' && (
                                <>
                                    <NavItem icon="UserPlus" label="إضافة وإدارة المعلمين" active={view === 'mgmt-teachers'} onClick={() => {setView('mgmt-teachers'); setSidebarOpen(false);}} />
                                    <NavItem icon="PlusCircle" label="تسجيل الطلاب" active={view === 'mgmt-students'} onClick={() => {setView('mgmt-students'); setSidebarOpen(false);}} />
                                    <NavItem icon="Link" label="تنسيب الطلاب" active={view === 'assign'} onClick={() => {setView('assign'); setSidebarOpen(false);}} />
                                </>
                            )}
                            {currentUserData.role === 'teacher' && (
                                <NavItem icon="PlusSquare" label="تسجيل حصة جديدة" active={view === 'add-lesson'} onClick={() => {setView('add-lesson'); setSidebarOpen(false);}} />
                            )}
                            <NavItem icon="FileText" label="سجل الحصص العام" active={view === 'reports'} onClick={() => {setView('reports'); setSidebarOpen(false);}} />
                        </nav>
                        <button onClick={() => setIsLoggedIn(false)} className="mt-auto flex items-center justify-center gap-3 text-red-400 p-4 hover:bg-white/10 rounded-2xl transition-all"><Icon name="LogOut" size={24} /> خروج</button>
                    </aside>

                    <main className="flex-1 p-4 md:p-12 overflow-y-auto w-full">
                        <header className="flex justify-between items-center mb-8 md:hidden">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 bg-royal-blue text-white rounded-xl shadow-lg"><Icon name="Menu" size={24}/></button>
                            <h2 className="text-xl text-slate-800">{view}</h2>
                        </header>

                        {/* المحتوى الرئيسي للوحة التحكم */}
                        {view === 'dashboard' && (
                            <div className="space-y-6">
                                {isOffline && currentUserData.role === 'admin' && (
                                    <div className="bg-amber-100 border-r-4 border-amber-500 p-4 rounded-xl text-amber-800 flex items-center gap-3">
                                        <Icon name="AlertTriangle" size={24} />
                                        <p className="text-sm">أنت تعمل في وضع "دون اتصال". البيانات لا تتشارك بين الأجهزة حالياً. يتطلب الأمر تفعيل قاعدة بيانات (Firebase).</p>
                                    </div>
                                )}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-gold text-center">
                                        <Icon name="Users" className="text-royal-gold mx-auto mb-2" size={40} />
                                        <p className="text-slate-400 text-sm">عدد المعلمين</p>
                                        <p className="text-4xl text-royal-blue">{teachers.length}</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-lg border-t-8 border-royal-blue text-center">
                                        <Icon name="Users" className="text-royal-blue mx-auto mb-2" size={40} />
                                        <p className="text-slate-400 text-sm">عدد الطلاب</p>
                                        <p className="text-4xl text-royal-gold">{students.length}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* إضافة معلمين */}
                        {view === 'mgmt-teachers' && currentUserData.role === 'admin' && (
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-[8px] border-[#1a3a5f]">
                                <h3 className="text-2xl mb-6 text-[#1a3a5f] flex items-center gap-2"><Icon name="user-plus" className="text-[#c5a044]" /> إضافة معلم جديد</h3>
                                <form className="space-y-4" onSubmit={async (e) => {
                                    e.preventDefault();
                                    const f = e.target.elements;
                                    // التأكد من أن اسم المستخدم الذي تنشئه للمعلم نظيف من المسافات
                                    const cleanUsername = f.user.value.trim().toLowerCase();
                                    const cleanPassword = f.pass.value.trim();
                                    
                                    await dbOp('teachers', { name: f.name.value.trim(), username: cleanUsername, password: cleanPassword });
                                    showAlert('تمت إضافة المعلم بنجاح');
                                    e.target.reset();
                                }}>
                                    <input name="name" placeholder="اسم المعلم" className="w-full clear-input bg-slate-50" required />
                                    {/* منع الهاتف من إضافة مسافات تلقائية أثناء إنشاء الحساب */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input name="user" placeholder="اسم المستخدم (إنجليزي)" className="w-full clear-input text-left en-input" autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                        <input name="pass" placeholder="كلمة المرور" className="w-full clear-input text-left en-input" autocapitalize="none" autocomplete="off" autocorrect="off" required />
                                    </div>
                                    <button className="w-full btn-gold py-4 rounded-xl text-lg">حفظ المعلم</button>
                                </form>
                            </div>
                        )}
                        
                        {/* ملاحظة: بقية الشاشات (الطلاب، الحصص) تعمل بنفس الطريقة السابقة تماماً وتعتمد على دالة dbOp للحفظ */}
                        {view !== 'dashboard' && view !== 'mgmt-teachers' && (
                            <div className="text-center p-10 text-slate-400">
                                <Icon name="Settings" size={60} className="mx-auto mb-4 opacity-50" />
                                <p>هذه الواجهة تعمل بنفس الطريقة السابقة تماماً لحفظ وإدارة البيانات.</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
